<script type="module" id="firebase-init">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  const firebaseConfig = {
    apiKey: "AIzaSyC-evVkXSlWqgN0LOfkzkgeILGncUZP54U",
    authDomain: "influ-lab-tracker.firebaseapp.com",
    projectId: "influ-lab-tracker",
    storageBucket: "influ-lab-tracker.firebasestorage.app",
    messagingSenderId: "476979246053",
    appId: "1:476979246053:web:5c260c065ae8ba591bb50c"
  };
  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);
  window._fb = {
    async save(rows) {
      try {
        const chunks = [];
        const chunkSize = 200;
        for (let i = 0; i < rows.length; i += chunkSize) chunks.push(rows.slice(i, i + chunkSize));
        for (let i = 0; i < chunks.length; i++) await setDoc(doc(db,"tracker","data_chunk_"+i),{rows:chunks[i],updatedAt:new Date().toISOString()});
        await setDoc(doc(db,"tracker","meta"),{totalChunks:chunks.length,totalRows:rows.length,updatedAt:new Date().toISOString()});
        return true;
      } catch(e) { console.error("Firebase save error:",e); return false; }
    },
    async load() {
      try {
        const meta = await getDoc(doc(db,"tracker","meta"));
        if (!meta.exists()) return null;
        const { totalChunks } = meta.data();
        let allRows = [];
        for (let i = 0; i < totalChunks; i++) {
          const chunk = await getDoc(doc(db,"tracker","data_chunk_"+i));
          if (chunk.exists()) allRows = allRows.concat(chunk.data().rows || []);
        }
        return allRows;
      } catch(e) { console.error("Firebase load error:",e); return null; }
    },
    async savePin(pin) {
      try { await setDoc(doc(db,"tracker","auth"),{pin,updatedAt:new Date().toISOString()}); return true; }
      catch(e) { return false; }
    },
    async loadPin() {
      try { const d=await getDoc(doc(db,"tracker","auth")); return d.exists()?d.data().pin:null; }
      catch(e) { return null; }
    }
  };
  window._fbReady = true;
  window.dispatchEvent(new Event("firebase-ready"));
</script>

function splitLine(line){
  const out=[];let cur="",inQ=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;continue;}inQ=!inQ;}
    else if(ch===','&&!inQ){out.push(cur.trim());cur="";}
    else cur+=ch;
  }
  out.push(cur.trim());return out;
}

function parseCSVText(text,rate){
  const clean=text.replace(/^\uFEFF/,"").replace(/\r\n/g,"\n").replace(/\r/g,"\n");
  const lines=clean.split("\n").filter(l=>l.trim());
  if(lines.length<2)return{rows:[],nameCol:null};
  const rawH=splitLine(lines[0]);
  const H=rawH.map(h=>h.toLowerCase().replace(/[""'']/g,"").trim());
  const fi=(...keys)=>{for(const k of keys){const i=H.findIndex(h=>h.includes(k));if(i>=0)return i;}return -1;};
  let iName=fi("nome da campanha","campaign name");
  let nameCol=rawH[iName]||"Nome da campanha";
  if(iName<0){iName=fi("nome do an","ad name");nameCol=rawH[iName]||"Ad Name";}
  if(iName<0){iName=fi("nome do conjunto","ad set");nameCol=rawH[iName]||"Ad Set";}
  const iDate=fi("início dos relat","reporting starts");
  const iSpent=fi("valor usado","amount spent");
  const iClick=fi("cliques no link","link clicks");
  const iCTR=fi("ctr (taxa","ctr");
  const iReach=fi("alcance","reach");
  const iFoll=fi("seguidores no instagram","seguidores","page likes");
  const iVisit=fi("visitas ao perfil","profile visits");
  const iConv=fi("conversas por mensagem","messaging conversation");
  const rows=[];
  for(let i=1;i<lines.length;i++){
    const c=splitLine(lines[i]);if(c.length<3)continue;
    const usd=iSpent>=0?(parseFloat(c[iSpent].replace(",",".").replace(/[^0-9.]/g,""))||0):0;
    const ctr=iCTR>=0?parseFloat(parseFloat(c[iCTR].replace(",",".")).toFixed(2))||0:0;
    const rawName=iName>=0?c[iName]:"Campanha "+i;
    const post=rawName.replace(/^Post do Instagram:\s*/i,"").trim()||rawName;
    rows.push({id:i,post,rawPost:rawName,
      date:iDate>=0?c[iDate].trim():"",
      investedUSD:usd,investedBRL:parseFloat((usd*rate).toFixed(2)),
      clicks:iClick>=0?parseInt(c[iClick])||0:0,ctr,
      reach:iReach>=0?parseInt(c[iReach])||0:0,
      followers:iFoll>=0?parseInt(c[iFoll])||0:0,
      profileVisits:iVisit>=0?parseInt(c[iVisit])||0:0,
      conversations:iConv>=0?parseInt(c[iConv])||0:0,
    });
  }
  return{rows,nameCol};
}

function Donut({value,max,color=L,size=110,stroke=11,label,sub}){
  const [v,setV]=useState(0);
  useEffect(()=>{const t=setTimeout(()=>setV(value),150);return()=>clearTimeout(t);},[value]);
  const r=(size-stroke*2)/2,cx=size/2,cy=size/2;
  const circ=2*Math.PI*r,pct=max>0?Math.min(v/max,1):0,dash=pct*circ,gap=circ-dash;
  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
      <div style={{position:"relative",width:size,height:size}}>
        <svg width={size} height={size} style={{transform:"rotate(-90deg)",position:"absolute",top:0,left:0}}>
          <circle cx={cx} cy={cy} r={r} fill="none" stroke="rgba(255,255,255,.07)" strokeWidth={stroke}/>
          <circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth={stroke}
            strokeDasharray={dash+" "+gap} strokeLinecap="round"
            style={{transition:"stroke-dasharray 1.2s cubic-bezier(.34,1.1,.64,1)"}}/>
        </svg>
        <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
          <div style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:size*.18,fontWeight:700,color:"#fff",lineHeight:1}}>{label}</div>
          {sub&&<div style={{fontSize:size*.1,color:"rgba(255,255,255,.4)",marginTop:2,textAlign:"center"}}>{sub}</div>}
        </div>
      </div>
    </div>
  );
}

function Spark({data,color=L,width=120,height=36}){
  if(!data||data.length<2)return null;
  const mn=Math.min(...data),mx=Math.max(...data),rng=mx-mn||1;
  const pts=data.map((v,i)=>(i/(data.length-1)*width)+","+(height-((v-mn)/rng)*(height-6)+3)).join(" ");
  return(
    <svg width="100%" height={height} viewBox={"0 0 "+width+" "+height} preserveAspectRatio="none" style={{overflow:"visible",display:"block"}}>
      <defs><style>{"@keyframes sk{to{stroke-dashoffset:0}}"}</style></defs>
      <polyline points={pts} fill="none" stroke={color} strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"
        style={{strokeDasharray:1000,strokeDashoffset:1000,animation:"sk 1.4s ease forwards .3s"}}/>
    </svg>
  );
}

const PC=[L,"#6366f1","#ec4899","#f59e0b","#14b8a6","#f472b6","#8b5cf6","#fb923c"];
function PieChart({items,dataKey,fmtVal}){
  const [mounted,setMounted]=useState(false);const [hov,setHov]=useState(null);
  useEffect(()=>{const t=setTimeout(()=>setMounted(true),100);return()=>clearTimeout(t);},[items]);
  const data=[...items].sort((a,b)=>b[dataKey]-a[dataKey]).slice(0,6);
  const total=data.reduce((s,d)=>s+d[dataKey],0);
  if(!total)return React.createElement("div",{style:{padding:20,color:"rgba(255,255,255,.2)",fontSize:11,textAlign:"center"}},"Sem dados");
  const cx=70,cy=70,R=62,ri=34;let ang=-Math.PI/2;
  const slices=data.map((d,i)=>{
    const pct=d[dataKey]/total,a0=ang,a1=ang+pct*Math.PI*2;ang=a1;
    const large=pct>.5?1:0;
    const p="M"+(cx+ri*Math.cos(a0))+","+(cy+ri*Math.sin(a0))+" L"+(cx+R*Math.cos(a0))+","+(cy+R*Math.sin(a0))+" A"+R+","+R+",0,"+large+",1,"+(cx+R*Math.cos(a1))+","+(cy+R*Math.sin(a1))+" L"+(cx+ri*Math.cos(a1))+","+(cy+ri*Math.sin(a1))+" A"+ri+","+ri+",0,"+large+",0,"+(cx+ri*Math.cos(a0))+","+(cy+ri*Math.sin(a0))+"Z";
    return{p,color:PC[i%PC.length],pct,d,i};
  });
  const act=hov!==null?slices[hov]:null;
  return(
    <div style={{display:"flex",alignItems:"center",gap:12}}>
      <svg width={140} height={140} style={{flexShrink:0,overflow:"visible"}}>
        <defs><style>{"@keyframes ps{from{opacity:0;transform:rotate(-90deg) scale(.5);transform-origin:70px 70px}to{opacity:1;transform:rotate(0) scale(1);transform-origin:70px 70px}}"}</style></defs>
        {slices.map((s,i)=>(
          <path key={i} d={s.p} fill={s.color}
            style={{opacity:mounted?1:0,animation:mounted?"ps .7s cubic-bezier(.34,1.2,.64,1) "+(i*55)+"ms both":"none",
              transform:hov===i?"scale(1.07)":"scale(1)",transformOrigin:"70px 70px",transition:"transform .18s cubic-bezier(.34,1.2,.64,1)",cursor:"pointer"}}
            onMouseEnter={()=>setHov(i)} onMouseLeave={()=>setHov(null)}/>
        ))}
        <circle cx={cx} cy={cy} r={ri-1} fill="#06060a"/>
        <text x={cx} y={cy-4} textAnchor="middle" fill="#fff" fontSize={act?12:10} fontWeight={700} fontFamily="Space Grotesk">{act?fmtVal(act.d[dataKey]):fmtVal(total)}</text>
        <text x={cx} y={cy+10} textAnchor="middle" fill="rgba(255,255,255,.35)" fontSize={8}>{act?((act.pct*100).toFixed(0)+"%"):"total"}</text>
      </svg>
      <div style={{display:"flex",flexDirection:"column",gap:5,flex:1}}>
        {slices.map((s,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:6,opacity:hov===null||hov===i?1:.4,transition:"opacity .18s",cursor:"pointer"}}
            onMouseEnter={()=>setHov(i)} onMouseLeave={()=>setHov(null)}>
            <div style={{width:7,height:7,borderRadius:2,background:s.color,flexShrink:0}}/>
            <span style={{fontSize:9.5,color:"rgba(255,255,255,.5)",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.d.post}</span>
            <span style={{fontSize:9.5,fontWeight:700,color:s.color}}>{(s.pct*100).toFixed(0)+"%"}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function FollowersGrowthChart({items}){
  const [go,setGo]=useState(false);
  useEffect(()=>{const t=setTimeout(()=>setGo(true),160);return()=>clearTimeout(t);},[items]);
  if(!items||items.length<1)return<EmptyChart/>;
  const sorted=[...items].sort((a,b)=>a.date>b.date?1:a.date<b.date?-1:0);
  const cumul=sorted.reduce((acc,r,i)=>{acc.push((acc[i-1]||0)+(r.followers||0));return acc;},[]);
  const total=cumul[cumul.length-1]||0;
  const mx=Math.max(...cumul,1);
  const W=500,H=100;
  const pts=cumul.map((v,i)=>({x:cumul.length===1?W/2:i/(cumul.length-1)*W,y:H-(v/mx)*(H-10)-4}));
  const line=pts.reduce((a,p,i)=>{if(i===0)return`M${p.x},${p.y}`;const q=pts[i-1],cx=(q.x+p.x)/2;return a+` C${cx},${q.y} ${cx},${p.y} ${p.x},${p.y}`;},"");
  const area=line+` L${pts[pts.length-1].x},${H+4} L${pts[0].x},${H+4} Z`;
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:10}}>
        <div style={{fontSize:32,fontWeight:700,color:L,fontFamily:"'Space Grotesk',sans-serif",lineHeight:1}}>+{fN(total)}</div>

          </linearGradient>
        </defs>
        <path d={area} fill="url(#fgr1)" style={{opacity:go?1:0,transition:"opacity .9s ease .3s"}}/>
        <path d={line} fill="none" stroke={L} strokeWidth={2.5} strokeLinecap="round"

  const sorted=[...items].sort((a,b)=>a.date>b.date?1:a.date<b.date?-1:0);
  const vals=sorted.map(r=>r.profileVisits||0);
  const total=vals.reduce((s,v)=>s+v,0);
  const mx=Math.max(...vals,1);
  const W=500,H=90;
  const pts=vals.map((v,i)=>({x:vals.length===1?W/2:i/(vals.length-1)*W,y:H-(v/mx)*(H-10)-4}));
  const line=pts.reduce((a,p,i)=>{if(i===0)return`M${p.x},${p.y}`;const q=pts[i-1],cx=(q.x+p.x)/2;return a+` C${cx},${q.y} ${cx},${p.y} ${p.x},${p.y}`;},"");
  const area=line+` L${pts[pts.length-1].x},${H+4} L${pts[0].x},${H+4} Z`;
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:10}}>
        <div style={{fontSize:32,fontWeight:700,color:"#14b8a6",fontFamily:"'Space Grotesk',sans-serif",lineHeight:1}}>{fN(total)}</div>
        <div style={{fontSize:10,color:"rgba(255,255,255,.3)"}}>visitas ao perfil</div>
      </div>
      <svg width="100%" height={H+6} viewBox={`0 0 ${W} ${H+6}`} preserveAspectRatio="none" style={{display:"block"}}>
        <defs>
          <linearGradient id="fgr2" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#14b8a6" stopOpacity={0.45}/>
            <stop offset="100%" stopColor="#14b8a6" stopOpacity={0.01}/>
          </linearGradient>
        </defs>
        <path d={area} fill="url(#fgr2)" style={{opacity:go?1:0,transition:"opacity .9s ease .3s"}}/>
        <path d={line} fill="none" stroke="#14b8a6" strokeWidth={2.5} strokeLinecap="round"
          style={{strokeDasharray:4000,strokeDashoffset:go?0:4000,transition:"stroke-dashoffset 2s ease"}}/>
        {pts.map((p,i)=>(
          <circle key={i} cx={p.x} cy={p.y} r={3.5} fill="#14b8a6"
            style={{opacity:go?1:0,transition:`opacity .3s ease ${.9+i*.04}s`}}/>
        ))}
      </svg>
    </div>
  );
}

function MetaFunnelChart({items}){
  const [go,setGo]=useState(false);
  useEffect(()=>{const t=setTimeout(()=>setGo(true),280);return()=>clearTimeout(t);},[items]);
  const reach=items.reduce((s,r)=>s+(r.reach||0),0);
  const vis=items.reduce((s,r)=>s+(r.profileVisits||0),0);
  const fo=items.reduce((s,r)=>s+(r.followers||0),0);
  if(!reach)return<EmptyChart/>;
  const stages=[
    {l:"Alcance",v:reach,pct:100},
    {l:"Visitas",v:vis,pct:reach?vis/reach*100:0},
    {l:"Seguidores",v:fo,pct:reach?fo/reach*100:0},
  ];
  const n=stages.length;
  // layout: each stage occupies an equal column
  const W=600,H=230,TOP=30,BOT=38;
  const colW=W/n;
  const CY=TOP+H/2;
  const MAXHH=H*0.47;
  // column centers (labels, %, values)
  const cx=i=>colW/2+i*colW;
  // half-height at each stage
  const hh=i=>go?Math.max(stages[i].pct/100*MAXHH,stages[i].v>0?6:1.5):1.5;
  // stage x positions = column centers (transition points between cols)
  // shape: flat in first col, S-curve wave between cols, flat in last col
  const buildPath=()=>{
    const pts=stages.map((_,i)=>cx(i));
    // top edge: start at left edge at hh(0), flat to col0 center,
    // then S-curves through centers, flat from col(n-1) center to right edge
    let top=`M0,${CY-hh(0)} L${pts[0]},${CY-hh(0)}`;
    for(let i=0;i<pts.length-1;i++){
      const mx=(pts[i]+pts[i+1])/2;
      top+=` C${mx},${CY-hh(i)} ${mx},${CY-hh(i+1)} ${pts[i+1]},${CY-hh(i+1)}`;
    }
    top+=` L${W},${CY-hh(n-1)}`;
    // bottom edge (right to left)
    let bot=` L${W},${CY+hh(n-1)} L${pts[n-1]},${CY+hh(n-1)}`;
    for(let i=pts.length-1;i>0;i--){
      const mx=(pts[i-1]+pts[i])/2;
      bot+=` C${mx},${CY+hh(i)} ${mx},${CY+hh(i-1)} ${pts[i-1]},${CY+hh(i-1)}`;
    }
    bot+=` L0,${CY+hh(0)} Z`;
    return top+bot;
  };
  const VBH=TOP+H+BOT;
  return(
    <div style={{width:"100%"}}>
      <svg width="100%" height={VBH} viewBox={`0 0 ${W} ${VBH}`} style={{display:"block"}}>
        <defs>
          <linearGradient id="funnelG" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stopColor="#4f6ef7"/>
            <stop offset="48%" stopColor="#7c3aed"/>
            <stop offset="100%" stopColor="#be185d"/>
          </linearGradient>
        </defs>
        {/* Column labels — top */}
        {stages.map((s,i)=>(
          <text key={i} x={cx(i)} y={16} textAnchor="middle"
            fill="rgba(255,255,255,.5)" fontSize={10} fontWeight={700} letterSpacing={0.5}>
            {s.l.toUpperCase()}
          </text>
        ))}
        {/* Vertical dividers */}
        {[1,2].slice(0,n-1).map(i=>(
          <line key={i} x1={i*colW} y1={TOP-2} x2={i*colW} y2={TOP+H+2}
            stroke="rgba(255,255,255,.12)" strokeWidth={1}/>
        ))}
        {/* Funnel shape */}
        <path d={buildPath()} fill="url(#funnelG)"
          style={{opacity:go?1:0,transition:"opacity .7s ease"}}/>
        {/* % labels inside */}
        {stages.map((s,i)=>(
          <text key={i} x={cx(i)} y={CY+5} textAnchor="middle"
            fill="#fff" fontSize={15} fontWeight={700}
            style={{opacity:go?1:0,transition:`opacity .5s ease ${.25+i*.15}s`,pointerEvents:"none"}}>
            {i===0?"100%":s.pct<0.1?"<0.1%":s.pct.toFixed(1)+"%"}
          </text>
        ))}
        {/* Values bottom */}
        {stages.map((s,i)=>(
          <text key={i} x={cx(i)} y={TOP+H+BOT-8} textAnchor="middle"
            fill="rgba(255,255,255,.45)" fontSize={12} fontWeight={600}
            style={{opacity:go?1:0,transition:`opacity .5s ease ${.4+i*.12}s`}}>
            {fN(s.v)}
          </text>
        ))}
      </svg>
    </div>
  );
}

function LoginScreen({onAuth}){
  const PIN_KEY="influ_pin_hash";
  const [storedPin,setStoredPin]=useState(localStorage.getItem(PIN_KEY));
  const [mode,setMode]=useState(localStorage.getItem(PIN_KEY)?"login":"register");
  const [pin,setPin]=useState("");
  const [confirm,setConfirm]=useState("");
  const [step,setStep]=useState("pin");
  const [shake,setShake]=useState(false);
  const [msg,setMsg]=useState("");
  const [visible,setVisible]=useState(false);
  const [pressedKey,setPressedKey]=useState(null);

  // Sync PIN from Firebase on load (in case localStorage was cleared)
  useEffect(()=>{
    setTimeout(()=>setVisible(true),80);
    if(!localStorage.getItem(PIN_KEY)&&window._fb){
      window._fb.loadPin().then(p=>{
        if(p){localStorage.setItem(PIN_KEY,p);setStoredPin(p);setMode("login");}
      });
    }
  },[]);

  function playClick(){
    try{
      const ctx=new(window.AudioContext||window.webkitAudioContext)();
      const osc=ctx.createOscillator();
      const gain=ctx.createGain();
      osc.connect(gain);gain.connect(ctx.destination);
      osc.type="sine";
      osc.frequency.setValueAtTime(1050,ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(600,ctx.currentTime+0.06);
      gain.gain.setValueAtTime(0.18,ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.09);
      osc.start(ctx.currentTime);osc.stop(ctx.currentTime+0.09);
    }catch(e){}
  }

  function doShake(m){setShake(true);setMsg(m);setPin("");if(step==="confirm")setConfirm("");setTimeout(()=>setShake(false),500);}

  function press(d){
    playClick();
    if(mode==="login"){
      const next=pin+d;setPin(next);
      if(next.length===4){setTimeout(()=>{const saved=localStorage.getItem(PIN_KEY);if(next===saved){onAuth();}else doShake("PIN incorreto. Tente novamente.");},120);}
    } else {
      if(step==="pin"){const next=pin+d;setPin(next);if(next.length===4){setTimeout(()=>setStep("confirm"),120);}}
      else{const next=confirm+d;setConfirm(next);if(next.length===4){setTimeout(()=>{if(next===pin){localStorage.setItem(PIN_KEY,pin);if(window._fb)window._fb.savePin(pin);onAuth();}else doShake("Os PINs não coincidem. Tente novamente.");},120);}}
    }
  }
  function del(){playClick();if(mode==="login")setPin(p=>p.slice(0,-1));else if(step==="pin")setPin(p=>p.slice(0,-1));else setConfirm(p=>p.slice(0,-1));}
  function switchMode(){setMode(m=>m==="login"?"register":"login");setPin("");setConfirm("");setStep("pin");setMsg("");}
  const cur=mode==="register"&&step==="confirm"?confirm:pin;
  const title=mode==="login"?"Entrar":step==="pin"?"Crie seu PIN":"Confirme seu PIN";
  const sub=mode==="login"?"Digite seu PIN de 4 dígitos":step==="pin"?"Escolha um PIN de 4 dígitos":"Digite o PIN novamente";

  return(
    <div style={{
      position:"fixed",inset:0,background:"#06060a",
      display:"flex",alignItems:"center",justifyContent:"center",
      fontFamily:"'DM Sans',sans-serif",
      opacity:visible?1:0,transform:visible?"translateY(0)":"translateY(24px)",
      transition:"opacity .4s cubic-bezier(.25,.46,.45,.94),transform .4s cubic-bezier(.25,.46,.45,.94)",
      padding:"env(safe-area-inset-top,20px) 20px env(safe-area-inset-bottom,20px)"
    }}>
      <div style={{
        display:"flex",flexDirection:"column",alignItems:"center",
        gap:36,width:"100%",maxWidth:360,
      }}>

        {/* Logo */}
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,
          opacity:visible?1:0,transform:visible?"translateY(0)":"translateY(16px)",
          transition:"opacity .5s ease .1s,transform .5s cubic-bezier(.34,1.1,.64,1) .1s"}}>
          <div style={{
            fontFamily:"'Space Grotesk',sans-serif",fontSize:48,fontWeight:700,letterSpacing:-2,
            background:"linear-gradient(135deg,#E1306C 0%,#F77737 50%,#E1306C 100%)",
            WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",lineHeight:1,userSelect:"none"
          }}>Influ Lab</div>
          <div style={{fontSize:12,letterSpacing:4,color:"rgba(255,255,255,.3)",textTransform:"uppercase",marginTop:2}}>Tracker</div>
        </div>

        {/* Title + PIN dots */}
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:24,width:"100%",
          opacity:visible?1:0,transform:visible?"translateY(0)":"translateY(16px)",
          transition:"opacity .5s ease .18s,transform .5s cubic-bezier(.34,1.1,.64,1) .18s"}}>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:17,fontWeight:600,color:"#fff",marginBottom:4}}>{title}</div>
            <div style={{fontSize:13,color:"rgba(255,255,255,.38)"}}>{sub}</div>
          </div>

          <div style={{display:"flex",gap:18,animation:shake?"pinShake .45s ease":"none"}}>
            {[0,1,2,3].map(i=>(
              <div key={i} style={{
                width:14,height:14,borderRadius:"50%",
                background:i<cur.length?L:"transparent",
                border:"2px solid "+(i<cur.length?L:"rgba(255,255,255,.3)"),
                transition:"background .15s,border-color .15s,transform .15s",
                transform:i<cur.length?"scale(1.15)":"scale(1)",
                boxShadow:i<cur.length?"0 0 10px rgba(225,48,108,.6)":"none"
              }}/>
            ))}
          </div>

          <div style={{height:16,fontSize:13,color:"#ff4d6d",textAlign:"center",opacity:msg?1:0,transition:"opacity .2s"}}>{msg}</div>
        </div>

        {/* Keypad */}
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,width:"100%",
          opacity:visible?1:0,transform:visible?"translateY(0)":"translateY(16px)",
          transition:"opacity .5s ease .26s,transform .5s cubic-bezier(.34,1.1,.64,1) .26s"}}>
          {[[1,2,3],[4,5,6],[7,8,9],["",0,"⌫"]].map((row,ri)=>(
            <div key={ri} style={{display:"flex",gap:4,width:"100%",justifyContent:"center"}}>
              {row.map((d,ci)=>{
                const isEmpty=d==="";const isDel=d==="⌫";const key=`${ri}-${ci}`;
                const isPressed=pressedKey===key;
                return(
                  <button key={ci}
                    onClick={isEmpty?undefined:isDel?del:()=>press(String(d))}
                    onMouseDown={()=>{if(!isEmpty)setPressedKey(key);}}
                    onMouseUp={()=>setPressedKey(null)}
                    onMouseLeave={()=>setPressedKey(null)}
                    onTouchStart={()=>{if(!isEmpty)setPressedKey(key);}}
                    onTouchEnd={()=>setPressedKey(null)}
                    disabled={isEmpty||(isDel&&cur.length===0)||(cur.length===4)}
                    style={{
                      width:88,height:68,borderRadius:14,border:"none",
                      background:isEmpty?"transparent":isPressed?(isDel?"rgba(255,255,255,.06)":"rgba(225,48,108,.22)"):(isDel?"transparent":"rgba(255,255,255,.07)"),
                      color:isDel?"rgba(255,255,255,.7)":"#fff",
                      fontSize:isDel?24:26,fontWeight:isDel?400:300,
                      fontFamily:"'DM Sans',sans-serif",
                      cursor:isEmpty||cur.length===4?"default":"pointer",
                      display:"flex",alignItems:"center",justifyContent:"center",
                      transform:isPressed&&!isEmpty?"scale(.93)":"scale(1)",
                      transition:"background .12s ease,transform .1s cubic-bezier(.34,1.2,.64,1),box-shadow .12s ease",
                      boxShadow:isPressed&&!isEmpty&&!isDel?"0 0 20px rgba(225,48,108,.3)":"none",
                      WebkitTapHighlightColor:"transparent",
                      outline:"none",
                      opacity:isEmpty?0:1,
                    }}
                  >{d}</button>
                );
              })}
            </div>
          ))}

        {/* Switch mode link */}
        <div style={{textAlign:"center",marginTop:4}}>
          {mode==="login"&&(
            <span style={{fontSize:13,color:"rgba(255,255,255,.4)"}}>
              Não tem PIN?{" "}
              <span onClick={switchMode} style={{color:L,fontWeight:600,cursor:"pointer",transition:"opacity .15s"}}
                onMouseEnter={e=>e.currentTarget.style.opacity=".7"}
                onMouseLeave={e=>e.currentTarget.style.opacity="1"}>Criar PIN</span>
            </span>
          )}
          {mode==="register"&&storedPin&&(
            <span style={{fontSize:13,color:"rgba(255,255,255,.4)"}}>
              Já tem PIN?{" "}
              <span onClick={switchMode} style={{color:L,fontWeight:600,cursor:"pointer",transition:"opacity .15s"}}
                onMouseEnter={e=>e.currentTarget.style.opacity=".7"}
                onMouseLeave={e=>e.currentTarget.style.opacity="1"}>Entrar</span>
            </span>
          )}
        </div>
        </div>{/* end keypad section */}

      </div>{/* end center column */}

      <style>{`
        @keyframes pinShake{0%,100%{transform:translateX(0)}15%{transform:translateX(-10px)}35%{transform:translateX(10px)}55%{transform:translateX(-7px)}75%{transform:translateX(7px)}90%{transform:translateX(-3px)}}
      `}</style>
    </div>
  );
}

                    </button>
                  ))}
                </div>
              </div>
            )}
          </div>
          {quick==="custom"&&(
            <div style={{display:"flex",gap:8,marginTop:8,alignItems:"center",flexWrap:"wrap"}}>
              <input type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)} style={{padding:"7px 10px",borderRadius:8,background:"#0c0c10",border:"1px solid rgba(255,255,255,.1)",color:"#e8e8e8",fontSize:12,outline:"none",transition:"border-color .2s ease"}}
                onFocus={e=>e.target.style.borderColor="rgba(225,48,108,.5)"}
                onBlur={e=>e.target.style.borderColor="rgba(255,255,255,.1)"}/>
              <span style={{color:"rgba(255,255,255,.25)"}}>→</span>
              <input type="date" value={dateTo} onChange={e=>setDateTo(e.target.value)} style={{padding:"7px 10px",borderRadius:8,background:"#0c0c10",border:"1px solid rgba(255,255,255,.1)",color:"#e8e8e8",fontSize:12,outline:"none",transition:"border-color .2s ease"}}
                onFocus={e=>e.target.style.borderColor="rgba(225,48,108,.5)"}
                onBlur={e=>e.target.style.borderColor="rgba(255,255,255,.1)"}/>
            </div>
          )}
          <div style={{marginTop:6,fontSize:11,color:"rgba(255,255,255,.25)"}}>
            <span style={{color:L,fontWeight:700}}>{T.count}</span>{" campanha"+(T.count!==1?"s":"")+" no período"}
          </div>
        </div>

        {/* ── OVERVIEW TAB ── */}
        {tab==="overview"&&(
          <div key={"ov-"+tabKey} className="page-enter" style={{display:"flex",flexDirection:"column",gap:14}}>
            <div className="g4 stagger" style={{display:"grid",gridTemplateColumns:"2fr 1.4fr 1.4fr 1.4fr",gap:14}}>
              <div className="metric-card" style={{...card,padding:"20px 22px",display:"flex",flexDirection:"column",gap:6,position:"relative",overflow:"hidden"}}>
                <div style={{fontSize:10,color:"rgba(255,255,255,.35)",fontWeight:600,textTransform:"uppercase",letterSpacing:".5px"}}>Total Investido</div>
                <div style={{...kv,fontSize:isMobile?26:32,background:IG_GRAD,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text"}}>{fR(T.tB)}</div>
                <div style={{fontSize:11,color:"rgba(255,255,255,.35)"}}>{fU(T.tU)}</div>
                <div style={{marginTop:6}}><Spark data={df.map(r=>r.investedBRL)} color={IG_SOLID} width={180} height={36}/></div>
                <div style={{position:"absolute",right:-20,top:-20,width:100,height:100,borderRadius:"50%",background:"rgba(225,48,108,.04)",pointerEvents:"none"}}/>
              </div>
              {[
                {label:"Seguidores Ganhos",val:"+"+fN(T.fo),sub:"Custo: "+fR(T.cpf)+"/seg",color:L,data:df.map(r=>r.followers)},
                {label:"Cliques no Link",val:fN(T.cl),sub:"CTR: "+T.avgCTR+"%",color:"#6366f1",data:df.map(r=>r.clicks)},
                {label:"Alcance Total",val:fN(T.re),sub:"Visitas: "+fN(T.vi),color:"#ec4899",data:df.map(r=>r.reach)},
              ].map(k=>(
                <div key={k.label} className="metric-card" style={{...card,padding:"18px 20px",display:"flex",flexDirection:"column",gap:4}}>
                  <div style={{fontSize:10,color:"rgba(255,255,255,.35)",fontWeight:600,textTransform:"uppercase",letterSpacing:".5px"}}>{k.label}</div>
                  <div style={{...kv,color:k.color,marginTop:4}}>{k.val}</div>
                  <div style={{fontSize:10,color:"rgba(255,255,255,.3)",marginTop:2}}>{k.sub}</div>
                  <div style={{marginTop:"auto",paddingTop:8}}><Spark data={k.data} color={k.color} width={120} height={28}/></div>
                </div>
              ))}
            </div>
            <div className="g3 stagger" style={{display:"grid",gridTemplateColumns:"1fr 1fr 1.5fr",gap:14}}>
              <div className="metric-card" style={{...card,padding:"18px 20px",display:"flex",flexDirection:"column",alignItems:"center",gap:8}}>
                <div style={{fontSize:10,color:"rgba(255,255,255,.35)",fontWeight:600,textTransform:"uppercase",letterSpacing:".5px",alignSelf:"flex-start"}}>CTR Médio</div>
                <Donut value={parseFloat(T.avgCTR)} max={10} color={IG_SOLID} size={110} stroke={11} label={T.avgCTR+"%"} sub=""/>
              </div>
              <div className="metric-card" style={{...card,padding:"18px 20px",display:"flex",flexDirection:"column",alignItems:"center",gap:8}}>
                <div style={{fontSize:10,color:"rgba(255,255,255,.35)",fontWeight:600,textTransform:"uppercase",letterSpacing:".5px",alignSelf:"flex-start"}}>Conversas</div>
                <Donut value={T.cv} max={Math.max(T.cv*1.5,1)} color="#f472b6" size={110} stroke={11} label={fN(T.cv)} sub=""/>
              </div>
              {topPost&&(
                <div className="metric-card" style={{...card,padding:"18px 20px"}}>
                  <div style={{fontSize:10,color:"rgba(255,255,255,.35)",fontWeight:600,textTransform:"uppercase",letterSpacing:".5px",marginBottom:10}}>🏆 Melhor Campanha</div>
                  <div style={{fontSize:13,fontWeight:600,color:"#fff",marginBottom:10,overflow:"hidden",textOverflow:"ellipsis",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}} title={topPost.rawPost}>{topPost.post}</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                    {[{l:"Seguidores",v:"+"+topPost.followers,c:L},{l:"Investido",v:fR(topPost.investedBRL),c:"rgba(255,255,255,.7)"},{l:"Cliques",v:fN(topPost.clicks),c:"#6366f1"},{l:"CTR",v:topPost.ctr+"%",c:"#ec4899"}].map(m=>(
                      <div key={m.l} style={{background:"rgba(255,255,255,.04)",borderRadius:8,padding:"8px 10px",transition:"background .15s ease"}}
                        onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,.07)"}
                        onMouseLeave={e=>e.currentTarget.style.background="rgba(255,255,255,.04)"}>
                        <div style={{fontSize:9,color:"rgba(255,255,255,.3)"}}>{m.l}</div>
                        <div style={{fontSize:14,fontWeight:700,color:m.c,marginTop:2}}>{m.v}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
            <div className="g3b stagger" style={{display:"grid",gridTemplateColumns:"1.3fr 1fr 1.3fr",gap:14}}>
              <div className="chart-card" style={{...card,padding:"18px 20px"}}>
                <div style={{fontSize:10,color:"rgba(255,255,255,.35)",fontWeight:600,textTransform:"uppercase",letterSpacing:".5px",marginBottom:12}}>Funil de Conversão</div>
                <Funnel items={df}/>
              </div>
              <div className="chart-card" style={{...card,padding:"18px 20px"}}>
                <div style={{fontSize:10,color:"rgba(255,255,255,.35)",fontWeight:600,textTransform:"uppercase",letterSpacing:".5px",marginBottom:12}}>Visitas ao Perfil</div>
                <HBar items={df} dataKey="profileVisits" color="#14b8a6" fmtVal={v=>fN(v)}/>
              </div>
              <div className="chart-card" style={{...card,padding:"18px 20px"}}>
                <div style={{fontSize:10,color:"rgba(255,255,255,.35)",fontWeight:600,textTransform:"uppercase",letterSpacing:".5px",marginBottom:10}}>Top Campanhas · Cliques</div>
                <HBar items={df} dataKey="clicks" color="#6366f1" fmtVal={v=>fN(v)}/>
              </div>
            </div>
            {/* Upload CSV */}
            <div style={{...card,padding:"18px 20px",display:"flex",flexDirection:"column",gap:12}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,flexWrap:"wrap"}}>
                <div style={{fontSize:10,color:"rgba(255,255,255,.35)",fontWeight:600,textTransform:"uppercase",letterSpacing:".5px"}}>Importar Dados via CSV</div>
                {!usingDemo&&rawData.length>0&&(
                  <div style={{fontSize:10,color:"rgba(255,255,255,.28)"}}>
                    {rawData.length} registros · {[...new Set(rawData.map(r=>r.date).filter(Boolean))].length} dias
                  </div>
                )}
              </div>
              <label className={"dz"+(dragOver?" ov":"")}
                onDragOver={e=>{e.preventDefault();setDragOver(true);}}
                onDragLeave={()=>setDragOver(false)} onDrop={onDrop}
                style={{padding:"9px 14px",gap:8}}>
                <input type="file" accept=".csv" onChange={e=>loadCSV(e.target.files[0])}/>
                <span style={{fontSize:18}}>📂</span>
                <div style={{fontSize:12,color:"rgba(255,255,255,.45)"}}>Arraste ou clique para importar CSV</div>
              </label>
              {!usingDemo&&rawData.length>0&&(()=>{
                const dates=[...new Set(rawData.map(r=>r.date).filter(Boolean))].sort().reverse();
                return(
                  <div>
                    <div style={{fontSize:9,color:"rgba(255,255,255,.25)",fontWeight:700,letterSpacing:".5px",marginBottom:6}}>DIAS CARREGADOS</div>
                    <div style={{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center"}}>
                      {dates.slice(0,15).map(d=>(
                        <span key={d} style={{padding:"3px 9px",borderRadius:20,background:"rgba(225,48,108,.1)",border:"1px solid rgba(225,48,108,.2)",color:L,fontSize:10,fontWeight:600}}>{d.slice(5)}</span>
                      ))}
                      {dates.length>15&&<span style={{fontSize:10,color:"rgba(255,255,255,.25)"}}>+{dates.length-15} mais</span>}
                    </div>
                    <div style={{marginTop:10,display:"flex",gap:8}}>
                      <button className="rb" style={{color:"#f87171",borderColor:"rgba(248,113,113,.2)"}} onClick={()=>{
                        if(window.confirm("Limpar todos os dados do histórico?")){
                          localStorage.removeItem("influ_history");
                          setRawData(applyRate(DEMO,rate));setUsingDemo(true);setNameCol(null);
                          if(window._fb)window._fb.save([]);
                          toast$("Dados apagados");
                        }
                      }}>🗑 Limpar histórico</button>
                    </div>
                  </div>
                );
              })()}
            </div>
          </div>
        )}

        {/* ── CHARTS TAB ── */}
        {tab==="charts"&&(
          <div key={"ch-"+tabKey} className="page-enter" style={{display:"flex",flexDirection:"column",gap:14}}>
            <div className="g2 stagger" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
              <div className="chart-card" style={{...card,padding:"18px 20px"}}>
                <div style={{fontSize:10,color:"rgba(255,255,255,.35)",fontWeight:600,textTransform:"uppercase",letterSpacing:".5px",marginBottom:4}}>Crescimento de Seguidores</div>
                <FollowersGrowthChart items={df}/>
              </div>
              <div className="chart-card" style={{...card,padding:"18px 20px"}}>
                <div style={{fontSize:10,color:"rgba(255,255,255,.35)",fontWeight:600,textTransform:"uppercase",letterSpacing:".5px",marginBottom:4}}>Custo por Seguidor · Eficiência</div>
                <CostPerFollowerChart items={df}/>
              </div>
            </div>
            <div className="chart-card" style={{...card,padding:"18px 20px"}}>
              <div style={{fontSize:10,color:"rgba(255,255,255,.35)",fontWeight:600,textTransform:"uppercase",letterSpacing:".5px",marginBottom:4}}>Visitas ao Perfil</div>
              <ProfileVisitsChart items={df}/>
            </div>
            <div className="chart-card" style={{...card,padding:"20px 22px"}}>
              <div style={{fontSize:10,color:"rgba(255,255,255,.35)",fontWeight:600,textTransform:"uppercase",letterSpacing:".5px",marginBottom:2}}>Funil do Caminho do Lead</div>
              <MetaFunnelChart items={df}/>
            </div>
            <div className="chart-card" style={{...card,padding:"18px 20px"}}>
              <div style={{fontSize:10,color:"rgba(255,255,255,.35)",fontWeight:600,textTransform:"uppercase",letterSpacing:".5px",marginBottom:12}}>Distribuição Geográfica</div>
              <WorldMapChart items={df}/>
            </div>
          </div>
        )}

        {/* ── TABLE TAB ── */}
        {tab==="table"&&(
          <div key={"tb-"+tabKey} className="page-enter" style={{display:"flex",flexDirection:"column",gap:10}}>
            {/* Search bar */}
            <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Buscar campanha..."
                style={{flex:1,minWidth:140,padding:"8px 14px",borderRadius:10,background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.1)",color:"#e8e8e8",fontSize:12,outline:"none",transition:"border-color .2s ease,box-shadow .2s ease"}}
                onFocus={e=>{e.target.style.borderColor="rgba(225,48,108,.5)";e.target.style.boxShadow="0 0 0 3px rgba(225,48,108,.08)";}}
                onBlur={e=>{e.target.style.borderColor="rgba(255,255,255,.1)";e.target.style.boxShadow="none";}}/>
              {isMobile&&[{k:"followers",l:"+Seg"},{k:"clicks",l:"Cliq"},{k:"reach",l:"Imp"}].map(c=>(
                <button key={c.k} onClick={()=>tSort(c.k)} style={{
                  padding:"5px 10px",borderRadius:20,fontSize:10,fontWeight:600,border:"none",cursor:"pointer",
                  background:sortBy===c.k?"rgba(225,48,108,.2)":"rgba(255,255,255,.06)",
                  color:sortBy===c.k?L:"rgba(255,255,255,.35)",flexShrink:0,transition:"all .15s ease"
                }}>{c.l}{sortBy===c.k?(sortDir==="desc"?" ↓":" ↑"):""}</button>
              ))}
            </div>

            {/* Grouped by day */}
            {groupedRows.length===0&&(
              <div style={{...card,padding:40,textAlign:"center",color:"rgba(255,255,255,.18)",fontSize:12}}>Nenhuma campanha no período</div>
            )}
            {groupedRows.map(([date,rows])=>{
              const dayInv=rows.reduce((s,r)=>s+r.investedBRL,0);
              const dayFo=rows.reduce((s,r)=>s+(r.followers||0),0);
              const dayRe=rows.reduce((s,r)=>s+(r.reach||0),0);
              const fmtDate=d=>{const [y,m,day]=d.split("-");const months=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];return(months[parseInt(m)-1]||m)+" "+day+", "+y;};
              return(
                <div key={date} style={{...card,overflow:"hidden"}}>
                  {/* Day header */}
                  <div style={{padding:"10px 18px",background:"rgba(255,255,255,.03)",borderBottom:"1px solid rgba(255,255,255,.06)",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                    <div style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:13,fontWeight:700,color:"#fff"}}>{fmtDate(date)}</div>
                    <div style={{flex:1}}/>
                    <span style={{fontSize:10,color:L,fontWeight:700}}>{fR(dayInv)}</span>
                    <span style={{fontSize:10,color:"rgba(255,255,255,.3)"}}>·</span>
                    <span style={{fontSize:10,color:L,fontWeight:600}}>+{fN(dayFo)} seg</span>
                    <span style={{fontSize:10,color:"rgba(255,255,255,.3)"}}>·</span>
                    <span style={{fontSize:10,color:"rgba(255,255,255,.3)"}}>{fN(dayRe)} alcance</span>
                    <span style={{padding:"2px 8px",borderRadius:20,background:"rgba(255,255,255,.06)",fontSize:9,color:"rgba(255,255,255,.4)",fontWeight:600}}>{rows.length} camp.</span>
                  </div>

                  {/* Desktop rows */}
                  {!isMobile&&(
                    <div style={{overflowX:"auto"}}>
                      <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                        <thead>
                          <tr style={{borderBottom:"1px solid rgba(255,255,255,.06)"}}>
                            {[{k:"post",l:"Campanha"},{k:"investedBRL",l:"Investido"},{k:"clicks",l:"Cliques"},{k:"ctr",l:"CTR"},{k:"reach",l:"Alcance"},{k:"profileVisits",l:"Visitas"},{k:"followers",l:"Seguidores"},{k:"conversations",l:"Conversas"}].map(c=>(
                              <th key={c.k} className={"th"+(sortBy===c.k?" on":"")} onClick={()=>tSort(c.k)}>{c.l}{sortBy===c.k?(sortDir==="desc"?" ↓":" ↑"):""}</th>
                            ))}
                          </tr>
                        </thead>
                        <tbody>
                          {rows.map((row,ri)=>(
                            <tr key={row.id} className="tr" style={{borderBottom:"1px solid rgba(255,255,255,.04)",animation:`cardIn .3s ease ${ri*.03}s both`}}>
                              <td style={{padding:"10px",fontWeight:500,color:"#e8e8e8",maxWidth:200,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}} title={row.rawPost||row.post}>{row.post}</td>
                              <td style={{padding:"10px",whiteSpace:"nowrap"}}>
                                <div style={{color:L,fontWeight:700}}>{fR(row.investedBRL)}</div>
                                <div style={{color:"rgba(255,255,255,.22)",fontSize:9,marginTop:1}}>{fU(row.investedUSD)}</div>
                              </td>
                              <td style={{padding:"10px",color:"#6366f1",fontWeight:600}}>{fN(row.clicks)}</td>
                              <td style={{padding:"10px"}}><span style={{padding:"2px 7px",borderRadius:20,fontSize:10,fontWeight:600,background:row.ctr>=3.5?"rgba(225,48,108,.12)":"rgba(99,102,241,.12)",color:row.ctr>=3.5?L:"#818cf8",border:"1px solid "+(row.ctr>=3.5?"rgba(225,48,108,.25)":"rgba(99,102,241,.25)")}}>{row.ctr+"%"}</span></td>
                              <td style={{padding:"10px",color:"#ec4899"}}>{fN(row.reach)}</td>
                              <td style={{padding:"10px",color:"#14b8a6"}}>{fN(row.profileVisits)}</td>
                              <td style={{padding:"10px",color:L,fontWeight:700}}>{"+"+(row.followers||0)}</td>
                              <td style={{padding:"10px",color:"#f472b6"}}>{row.conversations||0}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  )}

                  {/* Mobile rows */}
                  {isMobile&&(
                    <div style={{padding:"0 12px"}}>
                      <div style={{display:"flex",alignItems:"center",padding:"6px 0",borderBottom:"1px solid rgba(255,255,255,.08)"}}>
                        <div style={{flex:2,fontSize:8,color:"rgba(255,255,255,.28)",fontWeight:700,letterSpacing:".5px"}}>CAMPANHA</div>
                        {["SEG","R$/SEG","CLIQ","IMP"].map(h=>(
                          <div key={h} style={{flex:1,fontSize:8,color:"rgba(255,255,255,.28)",fontWeight:700,textAlign:"right",letterSpacing:".3px"}}>{h}</div>
                        ))}
                      </div>
                      {rows.map((row,ri)=>{
                        const cpf=row.followers>0?fN(Math.round(row.investedBRL/row.followers)):"—";
                        return(
                          <div key={row.id} style={{display:"flex",alignItems:"center",padding:"9px 0",borderBottom:"1px solid rgba(255,255,255,.04)",animation:`cardIn .3s ease ${ri*.03}s both`}}>
                            <div style={{flex:2,fontSize:10,fontWeight:600,color:"#fff",overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis",paddingRight:6}}>{row.post}</div>
                            <div style={{flex:1,fontSize:10,fontWeight:700,color:L,textAlign:"right",whiteSpace:"nowrap"}}>{"+"+(row.followers||0)}</div>
                            <div style={{flex:1,fontSize:10,fontWeight:700,color:"rgba(255,255,255,.65)",textAlign:"right",whiteSpace:"nowrap"}}>{cpf}</div>
                            <div style={{flex:1,fontSize:10,fontWeight:700,color:"rgba(255,255,255,.65)",textAlign:"right",whiteSpace:"nowrap"}}>{fN(row.clicks)}</div>
                            <div style={{flex:1,fontSize:10,fontWeight:700,color:"rgba(255,255,255,.65)",textAlign:"right",whiteSpace:"nowrap"}}>{fN(row.reach)}</div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}
      </div>

      {/* ── Mobile Bottom Nav ── */}
      {isMobile&&(
        <div className="bn">
          {/* Sliding active indicator */}
          <div style={{
            position:"absolute",top:0,
            left:`${navIdx*(100/3)+(100/3)/2}%`,
            transform:"translateX(-50%)",
            width:36,height:3,borderRadius:3,
            background:L,
            transition:"left .32s cubic-bezier(.34,1.2,.64,1)",
            boxShadow:`0 0 10px ${L}`
          }}/>
          {navItems.map(n=>(
            <button key={n.id} className={"bn-item"+(sideActive===n.id?" act":"")}
              onClick={()=>navTo(n.id)}>
              <span style={{fontSize:20,transition:"transform .22s cubic-bezier(.34,1.2,.64,1)",transform:sideActive===n.id?"scale(1.15)":"scale(1)"}}>{n.icon}</span>
              <span style={{fontSize:9,fontWeight:600,letterSpacing:".2px"}}>{n.label}</span>
            </button>
          ))}
        </div>
      )}

      {/* ── Toast ── */}
      {toast&&(
        <div key={toast.id} className="toast toast-enter" style={{background:toast.type==="err"?"rgba(239,68,68,.92)":"rgba(5,5,8,.97)",border:"1px solid "+(toast.type==="err"?"rgba(239,68,68,.4)":"rgba(225,48,108,.25)"),color:toast.type==="err"?"#fca5a5":L,boxShadow:toast.type==="err"?"0 8px 32px rgba(239,68,68,.3)":"0 8px 32px rgba(0,0,0,.6)"}}>
          {toast.msg}
        </div>
      )}
    </div>
  );
}

function App(){
  const [authed,setAuthed]=useState(()=>sessionStorage.getItem("influ_authed")==="1");
  function handleAuth(){sessionStorage.setItem("influ_authed","1");setAuthed(true);}
  if(!authed)return React.createElement(LoginScreen,{onAuth:handleAuth});
  return React.createElement(Dashboard);
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
