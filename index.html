function splitLine(line){
  const out=[];let cur="",inQ=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;continue;}inQ=!inQ;}
    else if(ch===','&&!inQ){out.push(cur.trim());cur="";}
    else cur+=ch;
  }
  out.push(cur.trim());return out;
}

function parseCSVText(text,rate){
  const clean=text.replace(/^\uFEFF/,"").replace(/\r\n/g,"\n").replace(/\r/g,"\n");
  const lines=clean.split("\n").filter(l=>l.trim());
  if(lines.length<2)return{rows:[],nameCol:null};
  const rawH=splitLine(lines[0]);
  const H=rawH.map(h=>h.toLowerCase().replace(/[""'']/g,"").trim());
  const fi=(...keys)=>{for(const k of keys){const i=H.findIndex(h=>h.includes(k));if(i>=0)return i;}return -1;};
  let iName=fi("nome da campanha","campaign name");
  let nameCol=rawH[iName]||"Nome da campanha";
  if(iName<0){iName=fi("nome do an","ad name");nameCol=rawH[iName]||"Ad Name";}
  if(iName<0){iName=fi("nome do conjunto","ad set");nameCol=rawH[iName]||"Ad Set";}
  const iDate=fi("início dos relat","reporting starts");
  const iSpent=fi("valor usado","amount spent");
  const iClick=fi("cliques no link","link clicks");
  const iCTR=fi("ctr (taxa","ctr");
  const iReach=fi("alcance","reach");
  const iFoll=fi("seguidores no instagram","seguidores","page likes");
  const iVisit=fi("visitas ao perfil","profile visits");
  const iConv=fi("conversas por mensagem","messaging conversation");
  const rows=[];
  for(let i=1;i<lines.length;i++){
    const c=splitLine(lines[i]);if(c.length<3)continue;
    const usd=iSpent>=0?(parseFloat(c[iSpent].replace(",",".").replace(/[^0-9.]/g,""))||0):0;
    const ctr=iCTR>=0?parseFloat(parseFloat(c[iCTR].replace(",",".")).toFixed(2))||0:0;
    const rawName=iName>=0?c[iName]:"Campanha "+i;
    const post=rawName.replace(/^Post do Instagram:\s*/i,"").trim()||rawName;
    rows.push({id:i,post,rawPost:rawName,
      date:iDate>=0?c[iDate].trim():"",
      investedUSD:usd,investedBRL:parseFloat((usd*rate).toFixed(2)),
      clicks:iClick>=0?parseInt(c[iClick])||0:0,ctr,
      reach:iReach>=0?parseInt(c[iReach])||0:0,
      followers:iFoll>=0?parseInt(c[iFoll])||0:0,
      profileVisits:iVisit>=0?parseInt(c[iVisit])||0:0,
      conversations:iConv>=0?parseInt(c[iConv])||0:0,
    });
  }
  return{rows,nameCol};
}

const fN=n=>{if(!n&&n!==0)return"—";if(n>=1e6)return(n/1e6).toFixed(1)+"M";if(n>=1000)return(n/1000).toFixed(1)+"K";return Number(n).toLocaleString("pt-BR");};

function Donut({value,max,color=L,size=110,stroke=11,label,sub}){
  const [v,setV]=useState(0);
  useEffect(()=>{const t=setTimeout(()=>setV(value),150);return()=>clearTimeout(t);},[value]);
  const r=(size-stroke*2)/2,cx=size/2,cy=size/2;
  const circ=2*Math.PI*r,pct=max>0?Math.min(v/max,1):0,dash=pct*circ,gap=circ-dash;
  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
      <div style={{position:"relative",width:size,height:size}}>
        <svg width={size} height={size} style={{transform:"rotate(-90deg)",position:"absolute",top:0,left:0}}>
          <circle cx={cx} cy={cy} r={r} fill="none" stroke="rgba(255,255,255,.07)" strokeWidth={stroke}/>
          <circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth={stroke}
            strokeDasharray={dash+" "+gap} strokeLinecap="round"
            style={{transition:"stroke-dasharray 1.2s cubic-bezier(.34,1.1,.64,1)"}}/>
        </svg>
        <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
          <div style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:size*.18,fontWeight:700,color:"#fff",lineHeight:1}}>{label}</div>
          {sub&&<div style={{fontSize:size*.1,color:"rgba(255,255,255,.4)",marginTop:2,textAlign:"center"}}>{sub}</div>}
        </div>
      </div>
    </div>
  );
}

function Spark({data,color=L,width=120,height=36}){
  if(!data||data.length<2)return null;
  const mn=Math.min(...data),mx=Math.max(...data),rng=mx-mn||1;
  const pts=data.map((v,i)=>(i/(data.length-1)*width)+","+(height-((v-mn)/rng)*(height-6)+3)).join(" ");
  return(
    <svg width={width} height={height} style={{overflow:"visible"}}>
      <defs><style>{"@keyframes sk{to{stroke-dashoffset:0}}"}</style></defs>
      <polyline points={pts} fill="none" stroke={color} strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"
        style={{strokeDasharray:1000,strokeDashoffset:1000,animation:"sk 1.4s ease forwards .3s"}}/>
    </svg>
  );
}

const PC=[L,"#6366f1","#ec4899","#f59e0b","#14b8a6","#f472b6","#8b5cf6","#fb923c"];
function PieChart({items,dataKey,fmtVal}){
  const [mounted,setMounted]=useState(false);const [hov,setHov]=useState(null);
  useEffect(()=>{const t=setTimeout(()=>setMounted(true),100);return()=>clearTimeout(t);},[items]);
  const data=[...items].sort((a,b)=>b[dataKey]-a[dataKey]).slice(0,6);
  const total=data.reduce((s,d)=>s+d[dataKey],0);
  if(!total)return React.createElement("div",{style:{padding:20,color:"rgba(255,255,255,.2)",fontSize:11,textAlign:"center"}},"Sem dados");
  const cx=70,cy=70,R=62,ri=34;let ang=-Math.PI/2;
  const slices=data.map((d,i)=>{
    const pct=d[dataKey]/total,a0=ang,a1=ang+pct*Math.PI*2;ang=a1;
    const large=pct>.5?1:0;
    const p="M"+(cx+ri*Math.cos(a0))+","+(cy+ri*Math.sin(a0))+" L"+(cx+R*Math.cos(a0))+","+(cy+R*Math.sin(a0))+" A"+R+","+R+",0,"+large+",1,"+(cx+R*Math.cos(a1))+","+(cy+R*Math.sin(a1))+" L"+(cx+ri*Math.cos(a1))+","+(cy+ri*Math.sin(a1))+" A"+ri+","+ri+",0,"+large+",0,"+(cx+ri*Math.cos(a0))+","+(cy+ri*Math.sin(a0))+"Z";
    return{p,color:PC[i%PC.length],pct,d,i};
  });
  const act=hov!==null?slices[hov]:null;
  return(
    <div style={{display:"flex",alignItems:"center",gap:12}}>
      <svg width={140} height={140} style={{flexShrink:0,overflow:"visible"}}>
        <defs><style>{"@keyframes ps{from{opacity:0;transform:rotate(-90deg) scale(.5);transform-origin:70px 70px}to{opacity:1;transform:rotate(0) scale(1);transform-origin:70px 70px}}"}</style></defs>
        {slices.map((s,i)=>(
          <path key={i} d={s.p} fill={s.color}
            style={{opacity:mounted?1:0,animation:mounted?"ps .7s cubic-bezier(.34,1.2,.64,1) "+(i*55)+"ms both":"none",
              transform:hov===i?"scale(1.07)":"scale(1)",transformOrigin:"70px 70px",transition:"transform .15s",cursor:"pointer"}}
            onMouseEnter={()=>setHov(i)} onMouseLeave={()=>setHov(null)}/>
        ))}
        <circle cx={cx} cy={cy} r={ri-1} fill="#1a1a1a"/>
        <text x={cx} y={cy-4} textAnchor="middle" fill="#fff" fontSize={act?12:10} fontWeight={700} fontFamily="Space Grotesk">{act?fmtVal(act.d[dataKey]):fmtVal(total)}</text>
        <text x={cx} y={cy+10} textAnchor="middle" fill="rgba(255,255,255,.35)" fontSize={8}>{act?((act.pct*100).toFixed(0)+"%"):"total"}</text>
      </svg>
      <div style={{display:"flex",flexDirection:"column",gap:5,flex:1}}>
        {slices.map((s,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:6,opacity:hov===null||hov===i?1:.4,transition:"opacity .15s",cursor:"pointer"}}
            onMouseEnter={()=>setHov(i)} onMouseLeave={()=>setHov(null)}>
            <div style={{width:7,height:7,borderRadius:2,background:s.color,flexShrink:0}}/>
            <span style={{fontSize:9.5,color:"rgba(255,255,255,.5)",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.d.post}</span>
            <span style={{fontSize:9.5,fontWeight:700,color:s.color}}>{(s.pct*100).toFixed(0)+"%"}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function HBar({items,dataKey,color,fmtVal}){
  const [go,setGo]=useState(false);
  useEffect(()=>{const t=setTimeout(()=>setGo(true),100);return()=>clearTimeout(t);},[items]);
  const sorted=[...items].sort((a,b)=>b[dataKey]-a[dataKey]).slice(0,6);
  const mx=Math.max(...sorted.map(d=>d[dataKey]),1);
  return(
    <div style={{display:"flex",flexDirection:"column",gap:7}}>
      {sorted.map((d,i)=>(
        <div key={i} style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{fontSize:9,color:"rgba(255,255,255,.4)",width:72,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",textAlign:"right",flexShrink:0}} title={d.post}>{d.post}</div>
          <div style={{flex:1,height:18,background:"rgba(255,255,255,.05)",borderRadius:4,overflow:"hidden"}}>
            <div style={{width:go?(d[dataKey]/mx*100)+"%":"0%",height:"100%",
              background:"linear-gradient(90deg,"+color+","+color+"66)",borderRadius:4,
              transition:"width .9s cubic-bezier(.34,1.2,.64,1) "+(i*70)+"ms"}}/>
          </div>
          <div style={{fontSize:9,fontWeight:700,color,width:36,textAlign:"right",flexShrink:0}}>{fmtVal(d[dataKey])}</div>
        </div>

  );
}

  const [countdown,setCountdown]=useState(INTERVAL);
  const [ddOpen,setDdOpen]=useState(false);
  const autoRef=useRef(null);const countRef=useRef(null);

  const toast$=(msg,type="ok")=>{setToast({msg,type});setTimeout(()=>setToast(null),4500);};

  useEffect(()=>{
    const check=()=>{const m=window.innerWidth<768;setIsMobile(m);if(m)setSideOpen(false);else setSideOpen(true);};

  },[]);

        .catch(fail));
  },[]);
  useEffect(()=>{fetchRate(true);},[]);

  const fetchMetaData=useCallback((token,accId,silent=false)=>{
    if(!token||!accId)return;
    setFetchingMeta(true);
    const since=dateFrom||isoToday();
    const until=dateTo||isoToday();
    const fields="campaign_name,ad_name,spend,clicks,ctr,reach,actions,date_start";
    const timeRange=JSON.stringify({since:since,until:until});
    const url="https://graph.facebook.com/v19.0/"+accId+"/insights"

      +"&time_range="+encodeURIComponent(timeRange)
      +"&level=ad&limit=100"
      +"&access_token="+token;

      .then(r=>r.json())
      .then(d=>{
        if(d.error)throw new Error(d.error.message||JSON.stringify(d.error));
        const data=d.data||[];
        if(!data.length)throw new Error("Sem campanhas no período. Selecione Máximo no filtro.");
        const getA=(actions,type)=>parseInt((actions&&actions.find(a=>a.action_type===type)&&actions.find(a=>a.action_type===type).value)||"0")||0;
        const rows=data.map((item,i)=>{
          const usd=parseFloat(item.spend||"0")||0;
          const actions=item.actions||[];
          const name=(item.ad_name||item.campaign_name||"Campanha "+(i+1)).replace(/^Post do Instagram:\s*/i,"").trim();
          return{id:i,post:name,rawPost:item.ad_name||name,date:item.date_start||since,
            investedUSD:usd,investedBRL:parseFloat((usd*rate).toFixed(2)),
            clicks:parseInt(item.clicks||"0")||0,
            ctr:parseFloat(parseFloat(item.ctr||"0").toFixed(2)),
            reach:parseInt(item.reach||"0")||0,
            followers:getA(actions,"like")+getA(actions,"follow"),
            profileVisits:getA(actions,"view_content")||0,
            conversations:getA(actions,"onsite_conversion.messaging_conversation_started_7d"),
          };
        });
        setRawData(rows);setUsingDemo(false);setNameCol("Meta API");
        setLastUpdate(new Date());setCountdown(INTERVAL);
        if(!silent)toast$("✓ "+rows.length+" campanhas atualizadas");
      })
      .catch(e=>{if(!silent)toast$("Erro: "+e.message,"err");})
      .finally(()=>setFetchingMeta(false));
  },[rate,dateFrom,dateTo]);

  const stopAuto=useCallback(()=>{clearInterval(autoRef.current);clearInterval(countRef.current);setAutoActive(false);},[]);
  const startAuto=useCallback((token,accId)=>{
    if(!token||!accId){toast$("Configure o Token e Ad Account ID","err");return;}
    stopAuto();
    fetchMetaData(token,accId,false);
    autoRef.current=setInterval(()=>fetchMetaData(token,accId,true),INTERVAL*1000);
    setCountdown(INTERVAL);
    countRef.current=setInterval(()=>setCountdown(c=>c<=1?INTERVAL:c-1),1000);
    setAutoActive(true);
  },[fetchMetaData,stopAuto]);
  useEffect(()=>()=>{clearInterval(autoRef.current);clearInterval(countRef.current);},[]);

  const saveConfig=(token,accId)=>{
    localStorage.setItem("influ_token",token);localStorage.setItem("influ_acc",accId);
    setMetaToken(token);setMetaAccId(accId);setShowConfig(false);
    startAuto(token,accId);
  };

  useEffect(()=>{
    if(metaToken&&metaAccId){setTimeout(()=>startAuto(metaToken,metaAccId),1500);}
  },[]);

  const applyQ=k=>{
    setQuick(k);const t=isoToday();
    if(k==="all"){setDateFrom("");setDateTo("");return;}
    if(k==="today"){setDateFrom(t);setDateTo(t);return;}
    if(k==="yesterday"){const y=new Date();y.setDate(y.getDate()-1);const s=y.toISOString().slice(0,10);setDateFrom(s);setDateTo(s);return;}
    if(k==="7"){const f=new Date();f.setDate(f.getDate()-7);setDateFrom(f.toISOString().slice(0,10));setDateTo(t);return;}
    if(k==="month"){const f=new Date();f.setDate(1);setDateFrom(f.toISOString().slice(0,10));setDateTo(t);return;}
    if(k==="lmonth"){const f=new Date();f.setDate(1);f.setMonth(f.getMonth()-1);setDateFrom(f.toISOString().slice(0,10));setDateTo(new Date(f.getFullYear(),f.getMonth()+1,0).toISOString().slice(0,10));return;}
  };

  const loadCSV=useCallback(file=>{
    if(!file)return;
    const rd=new FileReader();
    rd.onload=e=>{
      const{rows,nameCol:nc}=parseCSVText(e.target.result,rate);
      if(!rows.length){toast$("CSV sem dados.","err");return;}
      setRawData(rows);setUsingDemo(false);setNameCol(nc);
      const t=isoToday();setDateFrom(t);setDateTo(t);setQuick("today");
      toast$(rows.length+" campanhas carregadas");
    };
    rd.readAsText(file,"UTF-8");
  },[rate]);
  const onDrop=useCallback(e=>{e.preventDefault();setDragOver(false);loadCSV(e.dataTransfer.files[0]);},[loadCSV]);

  const df=useMemo(()=>rawData.filter(r=>{
    if(!r.date)return true;
    if(dateFrom&&r.date<dateFrom)return false;
    if(dateTo&&r.date>dateTo)return false;
    return true;
  }),[rawData,dateFrom,dateTo]);

  const T=useMemo(()=>{
    const d=df,n=d.length||1;

    const cl=d.reduce((s,r)=>s+r.clicks,0),re=d.reduce((s,r)=>s+r.reach,0);
    const fo=d.reduce((s,r)=>s+r.followers,0),vi=d.reduce((s,r)=>s+r.profileVisits,0);
    const cv=d.reduce((s,r)=>s+r.conversations,0);
    const avgCTR=(d.reduce((s,r)=>s+r.ctr,0)/n).toFixed(2);
    return{tU,tB,cl,re,fo,vi,cv,avgCTR,cpc:cl?tB/cl:0,cpf:fo?tB/fo:0,count:d.length};
  },[df]);

  const topPost=useMemo(()=>df.length?[...df].sort((a,b)=>b.followers-a.followers)[0]:null,[df]);

                {label:"Cliques no Link",val:fN(T.cl),sub:"CTR: "+T.avgCTR+"%",color:"#6366f1",data:df.map(r=>r.clicks)},

              <div style={{...card,padding:"18px 20px"}}><div style={{fontSize:10,color:"rgba(255,255,255,.35)",fontWeight:600,textTransform:"uppercase",letterSpacing:".5px",marginBottom:12}}>Funil de Conversão</div><Funnel items={df}/></div>
              <div style={{...card,padding:"18px 20px"}}><div style={{fontSize:10,color:"rgba(255,255,255,.35)",fontWeight:600,textTransform:"uppercase",letterSpacing:".5px",marginBottom:12}}>Visitas ao Perfil</div><HBar items={df} dataKey="profileVisits" color="#14b8a6" fmtVal={v=>fN(v)}/></div>
              <div style={{...card,padding:"18px 20px"}}><div style={{fontSize:10,color:"rgba(255,255,255,.35)",fontWeight:600,textTransform:"uppercase",letterSpacing:".5px",marginBottom:10}}>Top Campanhas · Cliques</div><HBar items={df} dataKey="clicks" color="#6366f1" fmtVal={v=>fN(v)}/></div>
            </div>
          </div>
        )}

        {tab==="charts"&&(
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div className="g2" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
              <div style={{...card,padding:"18px 20px"}}><div style={{fontSize:10,color:"rgba(255,255,255,.35)",fontWeight:600,textTransform:"uppercase",letterSpacing:".5px",marginBottom:12}}>Distribuição de Investimento</div><PieChart items={df} dataKey="investedBRL" fmtVal={v=>fR(v)}/></div>
              <div style={{...card,padding:"18px 20px"}}><div style={{fontSize:10,color:"rgba(255,255,255,.35)",fontWeight:600,textTransform:"uppercase",letterSpacing:".5px",marginBottom:12}}>Distribuição de Seguidores</div><PieChart items={df} dataKey="followers" fmtVal={v=>"+"+fN(v)}/></div>
            </div>
            <div className="g2" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
              <div style={{...card,padding:"18px 20px"}}><div style={{fontSize:10,color:"rgba(255,255,255,.35)",fontWeight:600,textTransform:"uppercase",letterSpacing:".5px",marginBottom:12}}>Funil de Conversão</div><Funnel items={df}/></div>
              <div style={{...card,padding:"18px 20px"}}><div style={{fontSize:10,color:"rgba(255,255,255,.35)",fontWeight:600,textTransform:"uppercase",letterSpacing:".5px",marginBottom:12}}>Distribuição de Cliques</div><PieChart items={df} dataKey="clicks" fmtVal={v=>fN(v)}/></div>
            </div>
            <div className="g2" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
              <div style={{...card,padding:"18px 20px"}}><div style={{fontSize:10,color:"rgba(255,255,255,.35)",fontWeight:600,textTransform:"uppercase",letterSpacing:".5px",marginBottom:12}}>Conversas por Campanha</div><HBar items={df} dataKey="conversations" color="#f472b6" fmtVal={v=>fN(v)}/></div>
              <div style={{...card,padding:"18px 20px"}}><div style={{fontSize:10,color:"rgba(255,255,255,.35)",fontWeight:600,textTransform:"uppercase",letterSpacing:".5px",marginBottom:12}}>Alcance por Campanha</div><HBar items={df} dataKey="reach" color="#ec4899" fmtVal={v=>fN(v)}/></div>
            </div>
          </div>
        )}

        {tab==="table"&&(
          <div style={{...card,padding:"18px 20px"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
              <div style={{fontSize:10,color:"rgba(255,255,255,.35)",fontWeight:600,textTransform:"uppercase",letterSpacing:".5px"}}>Detalhes por Campanha</div>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Buscar..."
                style={{padding:"5px 11px",borderRadius:8,background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.1)",color:"#e8e8e8",fontSize:11,outline:"none",width:180}}/>
            </div>
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                <thead>
                  <tr style={{borderBottom:"1px solid rgba(255,255,255,.07)"}}>
                    {[{k:"post",l:"Campanha"},{k:"date",l:"Data"},{k:"investedBRL",l:"Investido"},{k:"clicks",l:"Cliques"},{k:"ctr",l:"CTR"},{k:"reach",l:"Alcance"},{k:"profileVisits",l:"Visitas"},{k:"followers",l:"Seguidores"},{k:"conversations",l:"Conversas"}].map(c=>(
                      <th key={c.k} className={"th"+(sortBy===c.k?" on":"")} onClick={()=>tSort(c.k)}>{c.l}{sortBy===c.k?(sortDir==="desc"?" ↓":" ↑"):""}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {tableRows.map(row=>(
                    <tr key={row.id} className="tr" style={{borderBottom:"1px solid rgba(255,255,255,.04)"}}>
                      <td style={{padding:"10px",fontWeight:500,color:"#e8e8e8",maxWidth:200,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}} title={row.rawPost||row.post}>{row.post}</td>
                      <td style={{padding:"10px",color:"rgba(255,255,255,.3)",whiteSpace:"nowrap"}}>{row.date}</td>
                      <td style={{padding:"10px",whiteSpace:"nowrap"}}>
                        <div style={{color:L,fontWeight:700}}>{fR(row.investedBRL)}</div>
                        <div style={{color:"rgba(255,255,255,.22)",fontSize:9,marginTop:1}}>{fU(row.investedUSD)}</div>
                      </td>
                      <td style={{padding:"10px",color:"#6366f1",fontWeight:600}}>{fN(row.clicks)}</td>
                      <td style={{padding:"10px"}}><span style={{padding:"2px 7px",borderRadius:20,fontSize:10,fontWeight:600,background:row.ctr>=3.5?"rgba(198,241,53,.12)":"rgba(99,102,241,.12)",color:row.ctr>=3.5?L:"#818cf8",border:"1px solid "+(row.ctr>=3.5?"rgba(198,241,53,.25)":"rgba(99,102,241,.25)")}}>{row.ctr+"%"}</span></td>
                      <td style={{padding:"10px",color:"#ec4899"}}>{fN(row.reach)}</td>
                      <td style={{padding:"10px",color:"#14b8a6"}}>{fN(row.profileVisits)}</td>
                      <td style={{padding:"10px",color:L,fontWeight:700}}>{"+"+(row.followers||0)}</td>
                      <td style={{padding:"10px",color:"#f472b6"}}>{row.conversations||0}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
              {tableRows.length===0&&<div style={{textAlign:"center",padding:40,color:"rgba(255,255,255,.18)",fontSize:12}}>Nenhuma campanha no período</div>}
            </div>
          </div>
        )}
      </div>

      {isMobile&&(
        <div className="bn">
          {navItems.map(n=>(
            <button key={n.id} onClick={()=>{setSideActive(n.id);setTab(n.id);}}
              style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"4px 20px",border:"none",background:"transparent",cursor:"pointer",color:sideActive===n.id?L:"rgba(255,255,255,.35)",transition:"color .15s"}}>
              <span style={{fontSize:20}}>{n.icon}</span>
              <span style={{fontSize:9,fontWeight:600}}>{n.label}</span>
            </button>
          ))}
        </div>
      )}

      {toast&&(
        <div className="toast" style={{background:toast.type==="err"?"rgba(239,68,68,.92)":"rgba(26,26,26,.96)",border:"1px solid "+(toast.type==="err"?"rgba(239,68,68,.5)":"rgba(198,241,53,.3)"),color:toast.type==="err"?"#fca5a5":L}}>
          {toast.msg}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
