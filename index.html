<script type="module" id="firebase-init">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  const firebaseConfig = {
    apiKey: "AIzaSyC-evVkXSlWqgN0LOfkzkgeILGncUZP54U",
    authDomain: "influ-lab-tracker.firebaseapp.com",
    projectId: "influ-lab-tracker",
    storageBucket: "influ-lab-tracker.firebasestorage.app",
    messagingSenderId: "476979246053",
    appId: "1:476979246053:web:5c260c065ae8ba591bb50c"
  };
  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);
  window._fb = {
    async save(rows) {
      try {
        const chunks = [];
        const chunkSize = 200;
        for (let i = 0; i < rows.length; i += chunkSize) chunks.push(rows.slice(i, i + chunkSize));
        for (let i = 0; i < chunks.length; i++) await setDoc(doc(db,"tracker","data_chunk_"+i),{rows:chunks[i],updatedAt:new Date().toISOString()});
        await setDoc(doc(db,"tracker","meta"),{totalChunks:chunks.length,totalRows:rows.length,updatedAt:new Date().toISOString()});
        return true;
      } catch(e) { console.error("Firebase save error:",e); return false; }
    },
    async load() {
      try {
        const meta = await getDoc(doc(db,"tracker","meta"));
        if (!meta.exists()) return null;
        const { totalChunks } = meta.data();
        let allRows = [];
        for (let i = 0; i < totalChunks; i++) {
          const chunk = await getDoc(doc(db,"tracker","data_chunk_"+i));
          if (chunk.exists()) allRows = allRows.concat(chunk.data().rows || []);
        }
        return allRows;
      } catch(e) { console.error("Firebase load error:",e); return null; }
    },
    onUpdate(callback) {
      return onSnapshot(doc(db,"tracker","meta"), async () => {
        const rows = await window._fb.load();
        if (rows) callback(rows);
      });
    }
  };
  window._fbReady = true;
  window.dispatchEvent(new Event("firebase-ready"));
</script>

function splitLine(line){
  const out=[];let cur="",inQ=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;continue;}inQ=!inQ;}
    else if(ch===','&&!inQ){out.push(cur.trim());cur="";}
    else cur+=ch;
  }
  out.push(cur.trim());return out;
}

function parseCSVText(text,rate){
  const clean=text.replace(/^\uFEFF/,"").replace(/\r\n/g,"\n").replace(/\r/g,"\n");
  const lines=clean.split("\n").filter(l=>l.trim());
  if(lines.length<2)return{rows:[],nameCol:null};
  const rawH=splitLine(lines[0]);
  const H=rawH.map(h=>h.toLowerCase().replace(/[""'']/g,"").trim());
  const fi=(...keys)=>{for(const k of keys){const i=H.findIndex(h=>h.includes(k));if(i>=0)return i;}return -1;};
  let iName=fi("nome da campanha","campaign name");
  let nameCol=rawH[iName]||"Nome da campanha";
  if(iName<0){iName=fi("nome do an","ad name");nameCol=rawH[iName]||"Ad Name";}
  if(iName<0){iName=fi("nome do conjunto","ad set");nameCol=rawH[iName]||"Ad Set";}
  const iDate=fi("início dos relat","reporting starts");
  const iSpent=fi("valor usado","amount spent");
  const iClick=fi("cliques no link","link clicks");
  const iCTR=fi("ctr (taxa","ctr");
  const iReach=fi("alcance","reach");
  const iFoll=fi("seguidores no instagram","seguidores","page likes");
  const iVisit=fi("visitas ao perfil","profile visits");
  const iConv=fi("conversas por mensagem","messaging conversation");
  const rows=[];
  for(let i=1;i<lines.length;i++){
    const c=splitLine(lines[i]);if(c.length<3)continue;
    const usd=iSpent>=0?(parseFloat(c[iSpent].replace(",",".").replace(/[^0-9.]/g,""))||0):0;
    const ctr=iCTR>=0?parseFloat(parseFloat(c[iCTR].replace(",",".")).toFixed(2))||0:0;
    const rawName=iName>=0?c[iName]:"Campanha "+i;
    const post=rawName.replace(/^Post do Instagram:\s*/i,"").trim()||rawName;
    rows.push({id:i,post,rawPost:rawName,
      date:iDate>=0?c[iDate].trim():"",
      investedUSD:usd,investedBRL:parseFloat((usd*rate).toFixed(2)),
      clicks:iClick>=0?parseInt(c[iClick])||0:0,ctr,
      reach:iReach>=0?parseInt(c[iReach])||0:0,
      followers:iFoll>=0?parseInt(c[iFoll])||0:0,
      profileVisits:iVisit>=0?parseInt(c[iVisit])||0:0,
      conversations:iConv>=0?parseInt(c[iConv])||0:0,
    });
  }
  return{rows,nameCol};
}

const fN=n=>{if(!n&&n!==0)return"—";if(n>=1e6)return(n/1e6).toFixed(1)+"M";if(n>=1000)return(n/1000).toFixed(1)+"K";return Number(n).toLocaleString("pt-BR");};

function Donut({value,max,color=L,size=110,stroke=11,label,sub}){
  const [v,setV]=useState(0);
  useEffect(()=>{const t=setTimeout(()=>setV(value),150);return()=>clearTimeout(t);},[value]);
  const r=(size-stroke*2)/2,cx=size/2,cy=size/2;
  const circ=2*Math.PI*r,pct=max>0?Math.min(v/max,1):0,dash=pct*circ,gap=circ-dash;
  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
      <div style={{position:"relative",width:size,height:size}}>
        <svg width={size} height={size} style={{transform:"rotate(-90deg)",position:"absolute",top:0,left:0}}>
          <circle cx={cx} cy={cy} r={r} fill="none" stroke="rgba(255,255,255,.07)" strokeWidth={stroke}/>
          <circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth={stroke}
            strokeDasharray={dash+" "+gap} strokeLinecap="round"
            style={{transition:"stroke-dasharray 1.2s cubic-bezier(.34,1.1,.64,1)"}}/>
        </svg>
        <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
          <div style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:size*.18,fontWeight:700,color:"#fff",lineHeight:1}}>{label}</div>
          {sub&&<div style={{fontSize:size*.1,color:"rgba(255,255,255,.4)",marginTop:2,textAlign:"center"}}>{sub}</div>}
        </div>
      </div>
    </div>
  );
}

function Spark({data,color=L,width=120,height=36}){
  if(!data||data.length<2)return null;
  const mn=Math.min(...data),mx=Math.max(...data),rng=mx-mn||1;
  const pts=data.map((v,i)=>(i/(data.length-1)*width)+","+(height-((v-mn)/rng)*(height-6)+3)).join(" ");
  return(
    <svg width="100%" height={height} viewBox={"0 0 "+width+" "+height} preserveAspectRatio="none" style={{overflow:"visible",display:"block"}}>
      <defs><style>{"@keyframes sk{to{stroke-dashoffset:0}}"}</style></defs>
      <polyline points={pts} fill="none" stroke={color} strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"
        style={{strokeDasharray:1000,strokeDashoffset:1000,animation:"sk 1.4s ease forwards .3s"}}/>
    </svg>
  );
}

const PC=[L,"#6366f1","#ec4899","#f59e0b","#14b8a6","#f472b6","#8b5cf6","#fb923c"];
function PieChart({items,dataKey,fmtVal}){
  const [mounted,setMounted]=useState(false);const [hov,setHov]=useState(null);
  useEffect(()=>{const t=setTimeout(()=>setMounted(true),100);return()=>clearTimeout(t);},[items]);
  const data=[...items].sort((a,b)=>b[dataKey]-a[dataKey]).slice(0,6);
  const total=data.reduce((s,d)=>s+d[dataKey],0);
  if(!total)return React.createElement("div",{style:{padding:20,color:"rgba(255,255,255,.2)",fontSize:11,textAlign:"center"}},"Sem dados");
  const cx=70,cy=70,R=62,ri=34;let ang=-Math.PI/2;
  const slices=data.map((d,i)=>{
    const pct=d[dataKey]/total,a0=ang,a1=ang+pct*Math.PI*2;ang=a1;
    const large=pct>.5?1:0;
    const p="M"+(cx+ri*Math.cos(a0))+","+(cy+ri*Math.sin(a0))+" L"+(cx+R*Math.cos(a0))+","+(cy+R*Math.sin(a0))+" A"+R+","+R+",0,"+large+",1,"+(cx+R*Math.cos(a1))+","+(cy+R*Math.sin(a1))+" L"+(cx+ri*Math.cos(a1))+","+(cy+ri*Math.sin(a1))+" A"+ri+","+ri+",0,"+large+",0,"+(cx+ri*Math.cos(a0))+","+(cy+ri*Math.sin(a0))+"Z";
    return{p,color:PC[i%PC.length],pct,d,i};
  });
  const act=hov!==null?slices[hov]:null;
  return(
    <div style={{display:"flex",alignItems:"center",gap:12}}>
      <svg width={140} height={140} style={{flexShrink:0,overflow:"visible"}}>
        <defs><style>{"@keyframes ps{from{opacity:0;transform:rotate(-90deg) scale(.5);transform-origin:70px 70px}to{opacity:1;transform:rotate(0) scale(1);transform-origin:70px 70px}}"}</style></defs>
        {slices.map((s,i)=>(
          <path key={i} d={s.p} fill={s.color}
            style={{opacity:mounted?1:0,animation:mounted?"ps .7s cubic-bezier(.34,1.2,.64,1) "+(i*55)+"ms both":"none",
              transform:hov===i?"scale(1.07)":"scale(1)",transformOrigin:"70px 70px",transition:"transform .18s cubic-bezier(.34,1.2,.64,1)",cursor:"pointer"}}
            onMouseEnter={()=>setHov(i)} onMouseLeave={()=>setHov(null)}/>
        ))}
        <circle cx={cx} cy={cy} r={ri-1} fill="#06060a"/>
        <text x={cx} y={cy-4} textAnchor="middle" fill="#fff" fontSize={act?12:10} fontWeight={700} fontFamily="Space Grotesk">{act?fmtVal(act.d[dataKey]):fmtVal(total)}</text>
        <text x={cx} y={cy+10} textAnchor="middle" fill="rgba(255,255,255,.35)" fontSize={8}>{act?((act.pct*100).toFixed(0)+"%"):"total"}</text>
      </svg>
      <div style={{display:"flex",flexDirection:"column",gap:5,flex:1}}>
        {slices.map((s,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:6,opacity:hov===null||hov===i?1:.4,transition:"opacity .18s",cursor:"pointer"}}
            onMouseEnter={()=>setHov(i)} onMouseLeave={()=>setHov(null)}>
            <div style={{width:7,height:7,borderRadius:2,background:s.color,flexShrink:0}}/>
            <span style={{fontSize:9.5,color:"rgba(255,255,255,.5)",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.d.post}</span>
            <span style={{fontSize:9.5,fontWeight:700,color:s.color}}>{(s.pct*100).toFixed(0)+"%"}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function FollowersGrowthChart({items}){
  const [go,setGo]=useState(false);
  useEffect(()=>{const t=setTimeout(()=>setGo(true),160);return()=>clearTimeout(t);},[items]);
  if(!items||items.length<1)return<EmptyChart/>;
  const sorted=[...items].sort((a,b)=>a.date>b.date?1:a.date<b.date?-1:0);
  const cumul=sorted.reduce((acc,r,i)=>{acc.push((acc[i-1]||0)+(r.followers||0));return acc;},[]);
  const total=cumul[cumul.length-1]||0;
  const mx=Math.max(...cumul,1);
  const W=500,H=100;
  const pts=cumul.map((v,i)=>({x:cumul.length===1?W/2:i/(cumul.length-1)*W,y:H-(v/mx)*(H-10)-4}));
  const line=pts.reduce((a,p,i)=>{if(i===0)return`M${p.x},${p.y}`;const q=pts[i-1],cx=(q.x+p.x)/2;return a+` C${cx},${q.y} ${cx},${p.y} ${p.x},${p.y}`;},"");
  const area=line+` L${pts[pts.length-1].x},${H+4} L${pts[0].x},${H+4} Z`;
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:10}}>
        <div style={{fontSize:32,fontWeight:700,color:L,fontFamily:"'Space Grotesk',sans-serif",lineHeight:1}}>+{fN(total)}</div>
        <div style={{fontSize:10,color:"rgba(255,255,255,.3)"}}>seguidores acumulados</div>
      </div>
      <svg width="100%" height={H+6} viewBox={`0 0 ${W} ${H+6}`} preserveAspectRatio="none" style={{display:"block"}}>
        <defs>
          <linearGradient id="fgr1" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={L} stopOpacity={0.45}/>
            <stop offset="100%" stopColor={L} stopOpacity={0.01}/>
          </linearGradient>
        </defs>
        <path d={area} fill="url(#fgr1)" style={{opacity:go?1:0,transition:"opacity .9s ease .3s"}}/>
        <path d={line} fill="none" stroke={L} strokeWidth={2.5} strokeLinecap="round"
          style={{strokeDasharray:4000,strokeDashoffset:go?0:4000,transition:"stroke-dashoffset 2s ease"}}/>
        {pts.map((p,i)=>(
          <circle key={i} cx={p.x} cy={p.y} r={3.5} fill={L}
            style={{opacity:go?1:0,transition:`opacity .3s ease ${.9+i*.04}s`}}/>
        ))}
      </svg>
    </div>
  );
}

function ProfileVisitsChart({items}){
  const [go,setGo]=useState(false);
  useEffect(()=>{const t=setTimeout(()=>setGo(true),160);return()=>clearTimeout(t);},[items]);
  if(!items||items.length<1)return<EmptyChart/>;
  const sorted=[...items].sort((a,b)=>a.date>b.date?1:a.date<b.date?-1:0);
  const vals=sorted.map(r=>r.profileVisits||0);
  const total=vals.reduce((s,v)=>s+v,0);
  const mx=Math.max(...vals,1);
  const W=500,H=90;
  const pts=vals.map((v,i)=>({x:vals.length===1?W/2:i/(vals.length-1)*W,y:H-(v/mx)*(H-10)-4}));
  const line=pts.reduce((a,p,i)=>{if(i===0)return`M${p.x},${p.y}`;const q=pts[i-1],cx=(q.x+p.x)/2;return a+` C${cx},${q.y} ${cx},${p.y} ${p.x},${p.y}`;},"");
  const area=line+` L${pts[pts.length-1].x},${H+4} L${pts[0].x},${H+4} Z`;
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:10}}>

function MetaFunnelChart({items}){
  const [go,setGo]=useState(false);
  useEffect(()=>{const t=setTimeout(()=>setGo(true),280);return()=>clearTimeout(t);},[items]);
  const reach=items.reduce((s,r)=>s+(r.reach||0),0);
  const vis=items.reduce((s,r)=>s+(r.profileVisits||0),0);
  const cl=items.reduce((s,r)=>s+(r.clicks||0),0);
  const fo=items.reduce((s,r)=>s+(r.followers||0),0);
  const cv=items.reduce((s,r)=>s+(r.conversations||0),0);
  if(!reach)return<EmptyChart/>;
  const stages=[
    {l:"Alcance",v:reach,pct:100,c:"#6366f1"},
    {l:"Visitas",v:vis,pct:vis/reach*100,c:"#8b5cf6"},
    {l:"Cliques",v:cl,pct:cl/reach*100,c:"#be185d"},
    {l:"Seguidores",v:fo,pct:fo/reach*100,c:L},
    {l:"Conversas",v:cv,pct:cv/reach*100,c:"#f472b6"},
  ];
  const W=600,H=170,CY=H/2,MAXHH=H*0.46,segW=W/stages.length;
  const hh=i=>go?Math.max(stages[i].pct/100*MAXHH,stages[i].v>0?5:1.5):1.5;
  return(
    <div style={{overflowX:"auto"}}>
      <svg width="100%" height={H+62} viewBox={`0 0 ${W} ${H+62}`} style={{display:"block",overflow:"visible",minWidth:300}}>
        <defs>
          {stages.slice(0,-1).map((s,i)=>(
            <linearGradient key={i} id={`mfg${i}`} x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stopColor={s.c} stopOpacity={0.88}/>
              <stop offset="100%" stopColor={stages[i+1].c} stopOpacity={0.88}/>
            </linearGradient>
          ))}
        </defs>
        {stages.slice(0,-1).map((_,i)=>{
          const x1=i*segW,x2=(i+1)*segW,cx=(x1+x2)/2;
          const t1=CY-hh(i),b1=CY+hh(i),t2=CY-hh(i+1),b2=CY+hh(i+1);
          const d=`M${x1},${t1} C${cx},${t1} ${cx},${t2} ${x2},${t2} L${x2},${b2} C${cx},${b2} ${cx},${b1} ${x1},${b1} Z`;
          return<path key={i} d={d} fill={`url(#mfg${i})`}
            style={{opacity:go?1:0,transition:`opacity .55s ease ${i*.09}s`}}/>;
        })}
        {stages.map((s,i)=>(
          <rect key={i} x={i*segW-2} y={0} width={6} height={H} rx={3} fill={s.c}
            style={{transformBox:"fill-box",transformOrigin:"center",
              transform:go?`scaleY(${Math.max(stages[i].pct/100,.03)})`:"scaleY(0.01)",
              transition:`transform 1s cubic-bezier(.34,1.1,.64,1) ${i*.09}s`}}/>
        ))}
        {stages.map((s,i)=>(
          <text key={i} x={i*segW+segW/2} y={CY+5} textAnchor="middle"
            fill="#fff" fontSize={11} fontWeight={700}
            style={{opacity:go?1:0,transition:`opacity .5s ease ${.35+i*.09}s`}}>
            {i===0?"100%":s.pct<0.1?"<0.1%":s.pct.toFixed(1)+"%"}
          </text>
        ))}
        {stages.map((s,i)=>(
          <g key={i}>
            <text x={i*segW+segW/2} y={H+18} textAnchor="middle" fill="rgba(255,255,255,.5)" fontSize={9} fontWeight={600}>{s.l}</text>
            <text x={i*segW+segW/2} y={H+34} textAnchor="middle" fill={s.c} fontSize={13} fontWeight={700}>{fN(s.v)}</text>
            {i>0&&<text x={i*segW+segW/2} y={H+50} textAnchor="middle" fill="rgba(255,255,255,.25)" fontSize={8}>{s.pct.toFixed(2)}% do alcance</text>}
          </g>
        ))}
      </svg>
    </div>
  );
}

function LoginScreen({onAuth}){
  const PIN_KEY="influ_pin_hash";
  const stored=localStorage.getItem(PIN_KEY);
  const [mode,setMode]=useState(stored?"login":"register");
  const [pin,setPin]=useState("");
  const [confirm,setConfirm]=useState("");
  const [step,setStep]=useState("pin");
  const [shake,setShake]=useState(false);
  const [msg,setMsg]=useState("");
  const [visible,setVisible]=useState(false);
  const [pressedKey,setPressedKey]=useState(null);

  useEffect(()=>{setTimeout(()=>setVisible(true),80);},[]);

  function playClick(){
    try{
      const ctx=new(window.AudioContext||window.webkitAudioContext)();
      const osc=ctx.createOscillator();
      const gain=ctx.createGain();
      osc.connect(gain);gain.connect(ctx.destination);
      osc.type="sine";
      osc.frequency.setValueAtTime(1050,ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(600,ctx.currentTime+0.06);
      gain.gain.setValueAtTime(0.18,ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.09);
      osc.start(ctx.currentTime);osc.stop(ctx.currentTime+0.09);
    }catch(e){}
  }

  function doShake(m){setShake(true);setMsg(m);setPin("");if(step==="confirm")setConfirm("");setTimeout(()=>setShake(false),500);}

  function press(d){
    playClick();
    if(mode==="login"){
      const next=pin+d;setPin(next);
      if(next.length===4){setTimeout(()=>{if(next===localStorage.getItem(PIN_KEY)){onAuth();}else doShake("PIN incorreto. Tente novamente.");},120);}
    } else {
      if(step==="pin"){const next=pin+d;setPin(next);if(next.length===4){setTimeout(()=>setStep("confirm"),120);}}
      else{const next=confirm+d;setConfirm(next);if(next.length===4){setTimeout(()=>{if(next===pin){localStorage.setItem(PIN_KEY,pin);onAuth();}else doShake("Os PINs não coincidem. Tente novamente.");},120);}}
    }
  }
  function del(){playClick();if(mode==="login")setPin(p=>p.slice(0,-1));else if(step==="pin")setPin(p=>p.slice(0,-1));else setConfirm(p=>p.slice(0,-1));}
  function switchMode(){setMode(m=>m==="login"?"register":"login");setPin("");setConfirm("");setStep("pin");setMsg("");}
  const cur=mode==="register"&&step==="confirm"?confirm:pin;
  const title=mode==="login"?"Entrar":step==="pin"?"Crie seu PIN":"Confirme seu PIN";
  const sub=mode==="login"?"Digite seu PIN de 4 dígitos":step==="pin"?"Escolha um PIN de 4 dígitos":"Digite o PIN novamente";

  return(
    <div style={{
      position:"fixed",inset:0,background:"#06060a",
      display:"flex",alignItems:"center",justifyContent:"center",

      padding:"env(safe-area-inset-top,20px) 20px env(safe-area-inset-bottom,20px)"
    }}>
      <div style={{
        display:"flex",flexDirection:"column",alignItems:"center",
        gap:36,width:"100%",maxWidth:360,
      }}>

        {/* Logo */}
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,
          opacity:visible?1:0,transform:visible?"translateY(0)":"translateY(16px)",
          transition:"opacity .5s ease .1s,transform .5s cubic-bezier(.34,1.1,.64,1) .1s"}}>
          <div style={{
            fontFamily:"'Space Grotesk',sans-serif",fontSize:48,fontWeight:700,letterSpacing:-2,
            background:"linear-gradient(135deg,#E1306C 0%,#F77737 50%,#E1306C 100%)",
            WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",lineHeight:1,userSelect:"none"
          }}>Influ Lab</div>
          <div style={{fontSize:12,letterSpacing:4,color:"rgba(255,255,255,.3)",textTransform:"uppercase",marginTop:2}}>Tracker</div>
        </div>

        {/* Title + PIN dots */}
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:24,width:"100%",
          opacity:visible?1:0,transform:visible?"translateY(0)":"translateY(16px)",
          transition:"opacity .5s ease .18s,transform .5s cubic-bezier(.34,1.1,.64,1) .18s"}}>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:17,fontWeight:600,color:"#fff",marginBottom:4}}>{title}</div>
            <div style={{fontSize:13,color:"rgba(255,255,255,.38)"}}>{sub}</div>
          </div>

          <div style={{display:"flex",gap:18,animation:shake?"pinShake .45s ease":"none"}}>
            {[0,1,2,3].map(i=>(
              <div key={i} style={{
                width:14,height:14,borderRadius:"50%",
                background:i<cur.length?L:"transparent",
                border:"2px solid "+(i<cur.length?L:"rgba(255,255,255,.3)"),

            <div key={ri} style={{display:"flex",gap:4,width:"100%",justifyContent:"center"}}>

                const isEmpty=d==="";const isDel=d==="⌫";const key=`${ri}-${ci}`;

                      transform:isPressed&&!isEmpty?"scale(.93)":"scale(1)",
                      transition:"background .12s ease,transform .1s cubic-bezier(.34,1.2,.64,1),box-shadow .12s ease",
                      boxShadow:isPressed&&!isEmpty&&!isDel?"0 0 20px rgba(225,48,108,.3)":"none",
                      WebkitTapHighlightColor:"transparent",
                      outline:"none",
                      opacity:isEmpty?0:1,
                    }}
                  >{d}</button>
                );
              })}
            </div>
          ))}

        {/* Switch mode link */}
        <div style={{textAlign:"center",marginTop:4}}>
          {mode==="login"&&(
            <span style={{fontSize:13,color:"rgba(255,255,255,.4)"}}>
              Não tem PIN?{" "}
              <span onClick={switchMode} style={{color:L,fontWeight:600,cursor:"pointer",transition:"opacity .15s"}}
                onMouseEnter={e=>e.currentTarget.style.opacity=".7"}
                onMouseLeave={e=>e.currentTarget.style.opacity="1"}>Criar PIN</span>
            </span>
          )}
          {mode==="register"&&stored&&(
            <span style={{fontSize:13,color:"rgba(255,255,255,.4)"}}>
              Já tem PIN?{" "}
              <span onClick={switchMode} style={{color:L,fontWeight:600,cursor:"pointer",transition:"opacity .15s"}}
                onMouseEnter={e=>e.currentTarget.style.opacity=".7"}
                onMouseLeave={e=>e.currentTarget.style.opacity="1"}>Entrar</span>
            </span>
          )}
        </div>
        </div>{/* end keypad section */}

      </div>{/* end center column */}

      <style>{`
        @keyframes pinShake{0%,100%{transform:translateX(0)}15%{transform:translateX(-10px)}35%{transform:translateX(10px)}55%{transform:translateX(-7px)}75%{transform:translateX(7px)}90%{transform:translateX(-3px)}}
      `}</style>
    </div>
  );
}

function Dashboard(){

  const [rate,setRate]=useState(5.31);
  const [rateLabel,setRateLabel]=useState("...");
  const [refreshing,setRefreshing]=useState(false);
  const [rawData,setRawData]=useState(()=>{
    try{const saved=localStorage.getItem("influ_history");if(saved){const p=JSON.parse(saved);if(p&&p.length>0)return p;}}catch(e){}
    return applyRate(DEMO,5.31);
  });
  const [usingDemo,setUsingDemo]=useState(()=>{try{const s=localStorage.getItem("influ_history");return !s||JSON.parse(s).length===0;}catch(e){return true;}});
  const [nameCol,setNameCol]=useState(null);
  const [dragOver,setDragOver]=useState(false);
  const [toast,setToast]=useState(null);
  const [tab,setTab]=useState("overview");
  const [tabKey,setTabKey]=useState(0);
  const [sortBy,setSortBy]=useState("investedBRL");
  const [sortDir,setSortDir]=useState("desc");
  const [search,setSearch]=useState("");
  const [dateFrom,setDateFrom]=useState("");
  const [dateTo,setDateTo]=useState("");
  const [quick,setQuick]=useState("all");
  const [sideActive,setSideActive]=useState("overview");
  const [sideOpen,setSideOpen]=useState(true);
  const [isMobile,setIsMobile]=useState(false);
  const [metaToken,setMetaToken]=useState(()=>localStorage.getItem("influ_token")||"");
  const [metaAccId,setMetaAccId]=useState(()=>localStorage.getItem("influ_acc")||"");
  const [showConfig,setShowConfig]=useState(false);
  const [autoActive,setAutoActive]=useState(false);
  const [fetchingMeta,setFetchingMeta]=useState(false);
  const [lastUpdate,setLastUpdate]=useState(null);
  const [countdown,setCountdown]=useState(INTERVAL);
  const [ddOpen,setDdOpen]=useState(false);
  const autoRef=useRef(null);const countRef=useRef(null);
  const [fbStatus,setFbStatus]=useState("conectando...");
  const fbUnsubRef=useRef(null);

  // Nav helper with transition
  function navTo(id){
    if(id===tab)return;
    setTab(id);setSideActive(id);setTabKey(k=>k+1);
    if(isMobile)setSideOpen(false);
  }

  const toast$=(msg,type="ok")=>{setToast({msg,type,id:Date.now()});setTimeout(()=>setToast(null),4500);};

  useEffect(()=>{
    const init=async()=>{
      if(!window._fbReady){await new Promise(res=>window.addEventListener("firebase-ready",res,{once:true}));}
      try{
        const rows=await window._fb.load();
        if(rows&&rows.length>0){setRawData(rows);setUsingDemo(false);setFbStatus("sincronizado");saveHistory(rows);}
        else{const local=loadHistory();if(local&&local.length>0){setRawData(local);setUsingDemo(false);}setFbStatus("vazio");}
      }catch(e){setFbStatus("offline");}
      fbUnsubRef.current=window._fb.onUpdate(rows=>{
        if(rows&&rows.length>0){setRawData(rows);setUsingDemo(false);saveHistory(rows);setFbStatus("sincronizado");}
      });
    };
    init();
    return()=>{if(fbUnsubRef.current)fbUnsubRef.current();};
  },[]);

  useEffect(()=>{
    const check=()=>{const m=window.innerWidth<768;setIsMobile(m);if(m)setSideOpen(false);else setSideOpen(true);};
    check();window.addEventListener("resize",check);return()=>window.removeEventListener("resize",check);
  },[]);

  const applyNewRate=(v,src)=>{setRate(v);setRateLabel(src);setRawData(prev=>applyRate(prev,v));};
  const fetchRate=useCallback((silent=false)=>{
    setRefreshing(true);
    const done=(v,src)=>{applyNewRate(v,src);if(!silent)toast$("Cotação: R$ "+v.toFixed(2)+"/USD");setRefreshing(false);};
    const fail=()=>{setRateLabel("fixo");setRefreshing(false);};
    fetch("https://economia.awesomeapi.com.br/json/last/USD-BRL")
      .then(r=>r.json()).then(d=>{const v=parseFloat(d&&d.USDBRL&&d.USDBRL.bid);if(v>1){done(v,"ao vivo");return;}throw 0;})
      .catch(()=>fetch("https://open.er-api.com/v6/latest/USD")
        .then(r=>r.json()).then(d=>{const v=d&&d.rates&&d.rates.BRL;if(v>1){done(v,"ao vivo");return;}throw 0;})
        .catch(fail));
  },[]);
  useEffect(()=>{fetchRate(true);},[]);

  const fetchMetaData=useCallback((token,accId,silent=false)=>{
    if(!token||!accId)return;
    setFetchingMeta(true);
    const fields="campaign_name,ad_name,spend,clicks,ctr,reach,actions,date_start";
    let extraParams="";
    const since=dateFrom||isoToday();const until=dateTo||isoToday();
    extraParams="&time_range="+encodeURIComponent(JSON.stringify({since,until}));
    const url="https://graph.facebook.com/v19.0/"+accId+"/insights"+"?fields="+encodeURIComponent(fields)+extraParams+"&level=ad&limit=200"+"&access_token="+token;
    fetch(url).then(r=>r.json()).then(d=>{
      if(d.error)throw new Error(d.error.message||JSON.stringify(d.error));
      const data=d.data||[];
      if(!data.length)throw new Error("Sem campanhas no período. Selecione Máximo no filtro.");
      const getA=(actions,type)=>parseInt((actions&&actions.find(a=>a.action_type===type)&&actions.find(a=>a.action_type===type).value)||"0")||0;
      const rows=data.map((item,i)=>{
        const usd=parseFloat(item.spend||"0")||0;
        const actions=item.actions||[];
        const name=(item.ad_name||item.campaign_name||"Campanha "+(i+1)).replace(/^Post do Instagram:\s*/i,"").trim();
        return{id:i,post:name,rawPost:item.ad_name||name,date:item.date_start||isoToday(),
          investedUSD:usd,investedBRL:parseFloat((usd*rate).toFixed(2)),
          clicks:parseInt(item.clicks||"0")||0,ctr:parseFloat(parseFloat(item.ctr||"0").toFixed(2)),
          reach:parseInt(item.reach||"0")||0,
          followers:getA(actions,"like")+getA(actions,"follow"),
          profileVisits:getA(actions,"view_content")||0,
          conversations:getA(actions,"onsite_conversion.messaging_conversation_started_7d"),
        };
      });
      // Merge com histórico existente (CSV + dias anteriores), sem apagar nada
      let hist=[];
      try{const s=localStorage.getItem("influ_history");if(s)hist=JSON.parse(s);}catch(e){}
      const map=new Map();
      hist.forEach(r=>{map.set((r.post||"")+"__"+(r.date||""),r);});
      rows.forEach(r=>{const k=(r.post||"")+"__"+(r.date||"");map.set(k,{...r,id:map.size});});
      const merged=Array.from(map.values()).sort((a,b)=>((b.date||"")>(a.date||""))?1:-1).map((r,i)=>({...r,id:i}));
      try{localStorage.setItem("influ_history",JSON.stringify(merged));}catch(e){}
      setRawData(merged);setUsingDemo(false);setNameCol("Meta API");setLastUpdate(new Date());setCountdown(INTERVAL);
      if(window._fb){window._fb.save(merged).then(ok=>setFbStatus(ok?"sincronizado":"offline"));}
      if(!silent)toast$("✓ "+rows.length+" de hoje · "+merged.length+" total");
    }).catch(e=>{if(!silent)toast$("Erro: "+e.message,"err");}).finally(()=>setFetchingMeta(false));
  },[rate,dateFrom,dateTo]);

  const stopAuto=useCallback(()=>{clearInterval(autoRef.current);clearInterval(countRef.current);setAutoActive(false);},[]);
  const startAuto=useCallback((token,accId)=>{
    if(!token||!accId){toast$("Configure o Token e Ad Account ID","err");return;}
    stopAuto();fetchMetaData(token,accId,false);
    autoRef.current=setInterval(()=>fetchMetaData(token,accId,true),INTERVAL*1000);
    setCountdown(INTERVAL);countRef.current=setInterval(()=>setCountdown(c=>c<=1?INTERVAL:c-1),1000);
    setAutoActive(true);
  },[fetchMetaData,stopAuto]);
  useEffect(()=>()=>{clearInterval(autoRef.current);clearInterval(countRef.current);},[]);

  const saveConfig=(token,accId)=>{
    localStorage.setItem("influ_token",token);localStorage.setItem("influ_acc",accId);
    setMetaToken(token);setMetaAccId(accId);setShowConfig(false);
    startAuto(token,accId);
  };
  useEffect(()=>{if(metaToken&&metaAccId){setTimeout(()=>startAuto(metaToken,metaAccId),1500);}},[]);

  const loadHistory=()=>{try{const s=localStorage.getItem("influ_history");return s?JSON.parse(s):[];}catch(e){return[];}};
  const saveHistory=(rows)=>{try{localStorage.setItem("influ_history",JSON.stringify(rows));}catch(e){}};
  const mergeData=(existing,incoming)=>{
    const map=new Map();
    existing.forEach(r=>{const key=(r.post||"")+"__"+(r.date||"");map.set(key,r);});
    incoming.forEach(r=>{const key=(r.post||"")+"__"+(r.date||"");map.set(key,{...r,id:map.size});});
    return Array.from(map.values()).sort((a,b)=>((b.date||"")>(a.date||""))?1:-1).map((r,i)=>({...r,id:i}));
  };

  const applyQ=k=>{
    setQuick(k);const t=isoToday();
    if(k==="all"){setDateFrom("");setDateTo("");return;}
    if(k==="today"){setDateFrom(t);setDateTo(t);return;}
    if(k==="yesterday"){const y=new Date();y.setDate(y.getDate()-1);const s=y.toISOString().slice(0,10);setDateFrom(s);setDateTo(s);return;}
    if(k==="7"){const f=new Date();f.setDate(f.getDate()-7);setDateFrom(f.toISOString().slice(0,10));setDateTo(t);return;}
    if(k==="month"){const f=new Date();f.setDate(1);setDateFrom(f.toISOString().slice(0,10));setDateTo(t);return;}
    if(k==="lmonth"){const f=new Date();f.setDate(1);f.setMonth(f.getMonth()-1);setDateFrom(f.toISOString().slice(0,10));setDateTo(new Date(f.getFullYear(),f.getMonth()+1,0).toISOString().slice(0,10));return;}
  };

  const loadCSV=useCallback(file=>{
    if(!file)return;
    const rd=new FileReader();
    rd.onload=e=>{
      const{rows,nameCol:nc}=parseCSVText(e.target.result,rate);
      if(!rows.length){toast$("CSV sem dados.","err");return;}
      const history=loadHistory();const merged=mergeData(history,rows);
      saveHistory(merged);setRawData(merged);setUsingDemo(false);setNameCol(nc);
      if(window._fb){
        setFbStatus("salvando...");
        window._fb.save(merged).then(ok=>{setFbStatus(ok?"sincronizado":"offline");if(ok)toast$("✓ "+rows.length+" novos · "+merged.length+" total · sincronizado 🔥");else toast$("✓ "+merged.length+" salvos localmente (Firebase offline)");});
      } else {toast$("✓ "+rows.length+" novos · "+merged.length+" no histórico");}
    };
    rd.readAsText(file,"UTF-8");
  },[rate]);
  const onDrop=useCallback(e=>{e.preventDefault();setDragOver(false);loadCSV(e.dataTransfer.files[0]);},[loadCSV]);

  const df=useMemo(()=>rawData.filter(r=>{
    if(!r.date)return true;
    if(dateFrom&&r.date<dateFrom)return false;
    if(dateTo&&r.date>dateTo)return false;
    return true;
  }),[rawData,dateFrom,dateTo]);

  const T=useMemo(()=>{
    const d=df,n=d.length||1;
    const tU=d.reduce((s,r)=>s+r.investedUSD,0),tB=d.reduce((s,r)=>s+r.investedBRL,0);
    const cl=d.reduce((s,r)=>s+r.clicks,0),re=d.reduce((s,r)=>s+r.reach,0);
    const fo=d.reduce((s,r)=>s+r.followers,0),vi=d.reduce((s,r)=>s+r.profileVisits,0);
    const cv=d.reduce((s,r)=>s+r.conversations,0);
    const avgCTR=(d.reduce((s,r)=>s+r.ctr,0)/n).toFixed(2);
    return{tU,tB,cl,re,fo,vi,cv,avgCTR,cpc:cl?tB/cl:0,cpf:fo?tB/fo:0,count:d.length};
  },[df]);

  const tableRows=useMemo(()=>{
    let d=df.filter(r=>!search||r.post.toLowerCase().includes(search.toLowerCase()));
    return[...d].sort((a,b)=>{const v=sortDir==="asc"?1:-1;return a[sortBy]===b[sortBy]?0:(a[sortBy]>b[sortBy]?1:-1)*v;});
  },[df,search,sortBy,sortDir]);
  const tSort=k=>{if(sortBy===k)setSortDir(d=>d==="asc"?"desc":"asc");else{setSortBy(k);setSortDir("desc");}};
  const topPost=useMemo(()=>df.length?[...df].sort((a,b)=>b.followers-a.followers)[0]:null,[df]);

  const navItems=[{id:"overview",icon:"⊞",label:"Overview"},{id:"charts",icon:"◎",label:"Gráficos"},{id:"table",icon:"≡",label:"Campanhas"}];
  const metaOk=!!(metaToken&&metaAccId);
  const OPTS=[{k:"all",l:"Máximo"},{k:"today",l:"Hoje"},{k:"yesterday",l:"Ontem"},{k:"7",l:"Últimos 7 dias"},{k:"month",l:"Esse mês"},{k:"lmonth",l:"Mês passado"},{k:"custom",l:"Personalizado"}];
  const ddLabel=(OPTS.find(o=>o.k===quick)||{l:"Hoje"}).l;
  const card={background:"rgba(6,6,9,.85)",borderRadius:18,border:"1px solid rgba(255,255,255,.09)",boxShadow:"inset 0 1px 0 rgba(255,255,255,.07),0 8px 32px rgba(0,0,0,.6)",backdropFilter:"blur(20px) saturate(160%)",WebkitBackdropFilter:"blur(20px) saturate(160%)"};
  const kv={fontFamily:"'Space Grotesk',sans-serif",fontSize:22,fontWeight:700,lineHeight:1.1};
  const navIdx=navItems.findIndex(n=>n.id===sideActive);

  return(
    <div style={{display:"flex",minHeight:"100vh",maxWidth:"100vw",overflow:"hidden",background:"#06060a",fontFamily:"'DM Sans','Segoe UI',sans-serif",color:"#e8e8e8",position:"relative"}}>
      <style>{`

                          <td style={{padding:"10px",color:"rgba(255,255,255,.3)",whiteSpace:"nowrap"}}>{row.date}</td>
                          <td style={{padding:"10px",whiteSpace:"nowrap"}}>
                            <div style={{color:L,fontWeight:700}}>{fR(row.investedBRL)}</div>
                            <div style={{color:"rgba(255,255,255,.22)",fontSize:9,marginTop:1}}>{fU(row.investedUSD)}</div>
                          </td>
                          <td style={{padding:"10px",color:"#6366f1",fontWeight:600}}>{fN(row.clicks)}</td>
                          <td style={{padding:"10px"}}><span style={{padding:"2px 7px",borderRadius:20,fontSize:10,fontWeight:600,background:row.ctr>=3.5?"rgba(225,48,108,.12)":"rgba(99,102,241,.12)",color:row.ctr>=3.5?L:"#818cf8",border:"1px solid "+(row.ctr>=3.5?"rgba(225,48,108,.25)":"rgba(99,102,241,.25)")}}>{row.ctr+"%"}</span></td>
                          <td style={{padding:"10px",color:"#ec4899"}}>{fN(row.reach)}</td>
                          <td style={{padding:"10px",color:"#14b8a6"}}>{fN(row.profileVisits)}</td>
                          <td style={{padding:"10px",color:L,fontWeight:700}}>{"+"+(row.followers||0)}</td>
                          <td style={{padding:"10px",color:"#f472b6"}}>{row.conversations||0}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                  {tableRows.length===0&&<div style={{textAlign:"center",padding:40,color:"rgba(255,255,255,.18)",fontSize:12}}>Nenhuma campanha no período</div>}
                </div>
              )}

              {/* ── Mobile: tabela compacta ── */}
              {isMobile&&(
                <div>
                  {/* Sort pills */}
                  <div style={{display:"flex",gap:5,marginBottom:10,flexWrap:"wrap"}}>
                    {[{k:"followers",l:"+Seg"},{k:"clicks",l:"Cliq"},{k:"reach",l:"Imp"},{k:"date",l:"Data"}].map(c=>(
                      <button key={c.k} onClick={()=>tSort(c.k)} style={{
                        padding:"3px 8px",borderRadius:20,fontSize:10,fontWeight:600,border:"none",cursor:"pointer",
                        background:sortBy===c.k?"rgba(225,48,108,.2)":"rgba(255,255,255,.06)",
                        color:sortBy===c.k?L:"rgba(255,255,255,.35)",
                        transition:"all .15s ease"
                      }}>
                        {c.l}{sortBy===c.k?(sortDir==="desc"?" ↓":" ↑"):""}
                      </button>
                    ))}
                  </div>
                  {/* Header row */}
                  <div style={{display:"flex",alignItems:"center",paddingBottom:7,borderBottom:"1px solid rgba(255,255,255,.1)",marginBottom:2}}>
                    <div style={{flex:2,fontSize:8,color:"rgba(255,255,255,.28)",fontWeight:700,letterSpacing:".5px"}}>CAMPANHA</div>
                    <div style={{width:38,fontSize:8,color:"rgba(255,255,255,.28)",fontWeight:700,flexShrink:0,textAlign:"right"}}>DATA</div>
                    {["SEG","R$/SEG","CLIQ","IMP"].map(h=>(
                      <div key={h} style={{flex:1,fontSize:8,color:"rgba(255,255,255,.28)",fontWeight:700,textAlign:"right",letterSpacing:".3px"}}>{h}</div>
                    ))}
                  </div>
                  {/* Data rows */}
                  {tableRows.map((row,ri)=>{
                    const cpf=row.followers>0?fN(Math.round(row.investedBRL/row.followers)):"—";
                    return(
                    <div key={row.id} style={{
                      display:"flex",alignItems:"center",
                      padding:"9px 0",
                      borderBottom:"1px solid rgba(255,255,255,.04)",
                      animation:`cardIn .3s ease ${ri*.03}s both`
                    }}>
                      <div style={{flex:2,fontSize:10,fontWeight:600,color:"#fff",overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis",paddingRight:6}}>{row.post}</div>
                      <div style={{width:38,fontSize:9,color:"rgba(255,255,255,.28)",flexShrink:0,textAlign:"right",whiteSpace:"nowrap"}}>{(row.date||"").slice(5)}</div>
                      <div style={{flex:1,fontSize:10,fontWeight:700,color:L,textAlign:"right",whiteSpace:"nowrap"}}>{"+"+(row.followers||0)}</div>
                      <div style={{flex:1,fontSize:10,fontWeight:700,color:"rgba(255,255,255,.65)",textAlign:"right",whiteSpace:"nowrap"}}>{cpf}</div>
                      <div style={{flex:1,fontSize:10,fontWeight:700,color:"rgba(255,255,255,.65)",textAlign:"right",whiteSpace:"nowrap"}}>{fN(row.clicks)}</div>
                      <div style={{flex:1,fontSize:10,fontWeight:700,color:"rgba(255,255,255,.65)",textAlign:"right",whiteSpace:"nowrap"}}>{fN(row.reach)}</div>
                    </div>
                    );
                  })}
                  {tableRows.length===0&&<div style={{textAlign:"center",padding:40,color:"rgba(255,255,255,.18)",fontSize:12}}>Nenhuma campanha no período</div>}
                </div>
              )}
            </div>
          </div>
        )}
      </div>

      {/* ── Mobile Bottom Nav ── */}
      {isMobile&&(
        <div className="bn">
          {/* Sliding active indicator */}
          <div style={{
            position:"absolute",top:0,
            left:`${navIdx*(100/3)+(100/3)/2}%`,
            transform:"translateX(-50%)",
            width:36,height:3,borderRadius:3,
            background:L,
            transition:"left .32s cubic-bezier(.34,1.2,.64,1)",
            boxShadow:`0 0 10px ${L}`
          }}/>
          {navItems.map(n=>(
            <button key={n.id} className={"bn-item"+(sideActive===n.id?" act":"")}
              onClick={()=>navTo(n.id)}>
              <span style={{fontSize:20,transition:"transform .22s cubic-bezier(.34,1.2,.64,1)",transform:sideActive===n.id?"scale(1.15)":"scale(1)"}}>{n.icon}</span>
              <span style={{fontSize:9,fontWeight:600,letterSpacing:".2px"}}>{n.label}</span>
            </button>
          ))}
        </div>
      )}

      {/* ── Toast ── */}
      {toast&&(
        <div key={toast.id} className="toast toast-enter" style={{background:toast.type==="err"?"rgba(239,68,68,.92)":"rgba(5,5,8,.97)",border:"1px solid "+(toast.type==="err"?"rgba(239,68,68,.4)":"rgba(225,48,108,.25)"),color:toast.type==="err"?"#fca5a5":L,boxShadow:toast.type==="err"?"0 8px 32px rgba(239,68,68,.3)":"0 8px 32px rgba(0,0,0,.6)"}}>
          {toast.msg}
        </div>
      )}
    </div>
  );
}

function App(){
  const [authed,setAuthed]=useState(()=>sessionStorage.getItem("influ_authed")==="1");
  function handleAuth(){sessionStorage.setItem("influ_authed","1");setAuthed(true);}
  if(!authed)return React.createElement(LoginScreen,{onAuth:handleAuth});
  return React.createElement(Dashboard);
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
