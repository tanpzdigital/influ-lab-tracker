<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<title>Upload CSV → Firebase</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#06060a;color:#fff;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.card{background:#0c0c10;border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:32px;width:100%;max-width:520px}
h1{font-size:20px;font-weight:700;margin-bottom:6px}
p{color:rgba(255,255,255,.5);font-size:13px;margin-bottom:24px}
.drop{border:2px dashed rgba(255,255,255,.15);border-radius:12px;padding:36px 20px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:20px}
.drop:hover,.drop.over{border-color:#E1306C;background:rgba(225,48,108,.05)}
.drop input{display:none}
.drop-icon{font-size:32px;margin-bottom:10px}
.drop-text{font-size:14px;color:rgba(255,255,255,.6)}
.drop-text b{color:#E1306C}
.files{margin-bottom:20px}
.file-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:rgba(255,255,255,.05);border-radius:8px;margin-bottom:6px;font-size:13px}
.file-name{color:#fff;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-right:10px}
.file-remove{background:none;border:none;color:rgba(255,255,255,.3);cursor:pointer;font-size:16px;padding:0 4px}
.file-remove:hover{color:#E1306C}
.btn{width:100%;padding:14px;background:#E1306C;border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .2s}
.btn:hover{opacity:.85}
.btn:disabled{opacity:.4;cursor:not-allowed}
.log{margin-top:20px;background:#06060a;border-radius:10px;padding:14px;font-size:12px;font-family:monospace;max-height:200px;overflow-y:auto;display:none}
.log.show{display:block}
.log-line{padding:3px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.log-line.ok{color:#4ade80}
.log-line.err{color:#f87171}
.log-line.info{color:rgba(255,255,255,.6)}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px;display:none}
.stats.show{display:grid}
.stat{background:rgba(255,255,255,.05);border-radius:10px;padding:14px;text-align:center}
.stat-val{font-size:22px;font-weight:700;color:#E1306C}
.stat-label{font-size:11px;color:rgba(255,255,255,.5);margin-top:4px}
</style>
</head>
<body>
<div class="card">
  <h1>📤 Upload CSV → Firebase</h1>
  <p>Importe um ou mais CSVs do Meta Ads. Os dados serão mesclados e enviados diretamente ao Firebase.</p>

  <div class="drop" id="drop">
    <input type="file" id="fileInput" accept=".csv" multiple/>
    <div class="drop-icon">📁</div>
    <div class="drop-text">Arraste os CSVs aqui ou <b>clique para selecionar</b></div>
  </div>

  <div class="files" id="fileList"></div>
  <div class="stats" id="stats">
    <div class="stat"><div class="stat-val" id="st-new">0</div><div class="stat-label">Novos registros</div></div>
    <div class="stat"><div class="stat-val" id="st-total">0</div><div class="stat-label">Total no banco</div></div>
    <div class="stat"><div class="stat-val" id="st-dup">0</div><div class="stat-label">Duplicatas ignoradas</div></div>
  </div>
  <button class="btn" id="uploadBtn" disabled>Enviar para Firebase</button>
  <div class="log" id="log"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC-evVkXSlWqgN0LOfkzkgeILGncUZP54U",
  authDomain: "influ-lab-tracker.firebaseapp.com",
  projectId: "influ-lab-tracker",
  storageBucket: "influ-lab-tracker.firebasestorage.app",
  messagingSenderId: "476979246053",
  appId: "1:476979246053:web:5c260c065ae8ba591bb50c"
};
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

const RATE = 5.7; // Taxa USD→BRL padrão (ajuste se necessário)
let selectedFiles = [];

// ── UI helpers ──────────────────────────────────────
const log = (msg, type="info") => {
  const el = document.getElementById("log");
  el.classList.add("show");
  const line = document.createElement("div");
  line.className = "log-line " + type;
  line.textContent = new Date().toLocaleTimeString("pt-BR") + " — " + msg;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
};
const renderFiles = () => {
  const list = document.getElementById("fileList");
  list.innerHTML = selectedFiles.map((f,i) =>
    `<div class="file-item">
      <span class="file-name">📄 ${f.name}</span>
      <button class="file-remove" onclick="removeFile(${i})">✕</button>
    </div>`
  ).join("");
  document.getElementById("uploadBtn").disabled = selectedFiles.length === 0;
};

window.removeFile = (i) => { selectedFiles.splice(i,1); renderFiles(); };

// ── Drop zone ────────────────────────────────────────
const drop = document.getElementById("drop");
const input = document.getElementById("fileInput");
drop.onclick = () => input.click();
input.onchange = e => { selectedFiles = [...selectedFiles, ...e.target.files]; renderFiles(); };
drop.ondragover = e => { e.preventDefault(); drop.classList.add("over"); };
drop.ondragleave = () => drop.classList.remove("over");
drop.ondrop = e => { e.preventDefault(); drop.classList.remove("over"); selectedFiles = [...selectedFiles, ...e.dataTransfer.files]; renderFiles(); };

// ── CSV Parser ───────────────────────────────────────
function splitLine(l){const r=[];let cur="",q=false;for(const c of l){if(c==='"'){q=!q;}else if(c===","&&!q){r.push(cur.trim());cur="";}else cur+=c;}r.push(cur.trim());return r;}

function parseCSV(text) {
  const clean = text.replace(/^\uFEFF/,"").replace(/\r\n/g,"\n").replace(/\r/g,"\n");
  const lines = clean.split("\n").filter(l=>l.trim());
  if(lines.length < 2) return [];
  const rawH = splitLine(lines[0]);
  const H = rawH.map(h=>h.toLowerCase().replace(/[""'']/g,"").trim());
  const fi = (...keys) => { for(const k of keys){const i=H.findIndex(h=>h.includes(k));if(i>=0)return i;} return -1; };
  const iName  = fi("nome da campanha","campaign name","nome do an","ad name","nome do conjunto","ad set");
  const iDate  = fi("início dos relat","reporting starts","data");
  const iSpent = fi("valor usado","amount spent");
  const iClick = fi("cliques no link","link clicks");
  const iCTR   = fi("ctr");
  const iReach = fi("alcance","reach");
  const iFoll  = fi("seguidores no instagram","seguidores","page likes");
  const iVisit = fi("visitas ao perfil","profile visits");
  const iConv = fi("conversas por mensagem","messaging conversation");
  const iCPC  = fi("cpc (todos)","cost per click");
  const raw = [];
  for(let i=1;i<lines.length;i++){
    const c = splitLine(lines[i]);
    if(c.length < 3) continue;
    const usd = iSpent>=0 ? (parseFloat(c[iSpent].replace(",",".").replace(/[^0-9.]/g,""))||0) : 0;
    const rawName = iName>=0 ? c[iName] : "Campanha "+i;
    const post = rawName.replace(/^Post do Instagram:\s*/i,"").trim() || rawName;
    const date = iDate>=0 ? c[iDate].trim() : "";
    let clicks = iClick>=0 ? (parseInt(c[iClick])||0) : 0;
    if(clicks===0 && iCPC>=0 && usd>0){
      const cpc = parseFloat(c[iCPC].replace(",",".").replace(/[^0-9.]/g,""))||0;
      if(cpc>0) clicks = Math.round(usd/cpc);
    }
    raw.push({ post, rawPost:rawName, date, investedUSD:usd, clicks,
      ctr:    iCTR>=0   ? (parseFloat(parseFloat(c[iCTR].replace(",",".")).toFixed(2))||0) : 0,
      reach:  iReach>=0 ? (parseInt(c[iReach])||0) : 0,
      followers:    iFoll>=0  ? (parseInt(c[iFoll])||0) : 0,
      profileVisits:iVisit>=0 ? (parseInt(c[iVisit])||0) : 0,
      conversations:iConv>=0  ? (parseInt(c[iConv])||0) : 0,
    });
  }
  // Agrega linhas com mesmo nome+data (diferentes conjuntos de anúncios)
  const aggMap = new Map();
  raw.forEach(r => {
    const k = (r.post||"")+"__"+(r.date||"");
    if(aggMap.has(k)){
      const e = aggMap.get(k);
      const newUSD = e.investedUSD + r.investedUSD;
      const newReach = e.reach + r.reach;
      const newClicks = e.clicks + r.clicks;
      aggMap.set(k,{...e, investedUSD:newUSD, clicks:newClicks, reach:newReach,
        followers:e.followers+r.followers, profileVisits:e.profileVisits+r.profileVisits,
        conversations:e.conversations+r.conversations,
        ctr:newReach>0?parseFloat((newClicks/newReach*100).toFixed(2)):e.ctr});
    } else { aggMap.set(k,{...r}); }
  });
  return Array.from(aggMap.values()).map((r,i)=>({
    ...r, id:i, investedBRL:parseFloat((r.investedUSD*RATE).toFixed(2))
  }));
}

function mergeData(existing, incoming) {
  const map = new Map();
  existing.forEach(r => map.set((r.post||"")+"__"+(r.date||""), r));
  let newCount = 0;
  incoming.forEach(r => {
    const k = (r.post||"")+"__"+(r.date||"");
    if(!map.has(k)) newCount++;
    map.set(k, {...r});
  });
  const merged = Array.from(map.values()).sort((a,b)=>((b.date||"")>(a.date||""))?1:-1).map((r,i)=>({...r,id:i}));
  return { merged, newCount, dupCount: incoming.length - newCount };
}

// ── Firebase save ────────────────────────────────────
async function saveToFirebase(rows) {
  const chunks = [];
  for(let i=0; i<rows.length; i+=200) chunks.push(rows.slice(i,i+200));
  for(let i=0; i<chunks.length; i++){
    await setDoc(doc(db,"tracker","data_chunk_"+i), {rows:chunks[i], updatedAt:new Date().toISOString()});
    log(`Chunk ${i+1}/${chunks.length} salvo (${chunks[i].length} linhas)`, "ok");
  }
  await setDoc(doc(db,"tracker","meta"), {totalChunks:chunks.length, totalRows:rows.length, updatedAt:new Date().toISOString()});
}

async function loadFromFirebase() {
  const meta = await getDoc(doc(db,"tracker","meta"));
  if(!meta.exists()) return [];
  const { totalChunks } = meta.data();
  let all = [];
  for(let i=0; i<totalChunks; i++){
    const chunk = await getDoc(doc(db,"tracker","data_chunk_"+i));
    if(chunk.exists()) all = all.concat(chunk.data().rows || []);
  }
  return all;
}

// ── Upload handler ───────────────────────────────────
document.getElementById("uploadBtn").onclick = async () => {
  const btn = document.getElementById("uploadBtn");
  btn.disabled = true;
  btn.textContent = "Enviando...";
  document.getElementById("log").innerHTML = "";
  document.getElementById("stats").classList.remove("show");

  try {
    // 1. Ler todos os CSVs selecionados
    let allNew = [];
    for(const file of selectedFiles) {
      log(`Lendo: ${file.name}`, "info");
      const text = await file.text();
      const rows = parseCSV(text);
      log(`  → ${rows.length} linhas encontradas`, rows.length > 0 ? "ok" : "err");
      allNew = allNew.concat(rows);
    }

    if(allNew.length === 0) { log("Nenhuma linha válida encontrada nos CSVs.", "err"); return; }

    // 2. Carregar dados existentes do Firebase
    log("Carregando dados existentes do Firebase...", "info");
    const existing = await loadFromFirebase();
    log(`  → ${existing.length} registros existentes`, "info");

    // 3. Merge
    const { merged, newCount, dupCount } = mergeData(existing, allNew);
    log(`Merge: ${newCount} novos · ${dupCount} duplicatas ignoradas · ${merged.length} total`, "ok");

    // 4. Salvar no Firebase
    log("Salvando no Firebase...", "info");
    await saveToFirebase(merged);
    log(`✅ Concluído! ${merged.length} registros no Firebase.`, "ok");

    // 5. Atualizar stats
    document.getElementById("st-new").textContent   = newCount;
    document.getElementById("st-total").textContent = merged.length;
    document.getElementById("st-dup").textContent   = dupCount;
    document.getElementById("stats").classList.add("show");

    btn.textContent = "✓ Enviado com sucesso!";
    btn.style.background = "#22c55e";
    setTimeout(() => { btn.textContent = "Enviar para Firebase"; btn.style.background = ""; btn.disabled = false; }, 3000);

  } catch(e) {
    log("Erro: " + e.message, "err");
    console.error(e);
    btn.textContent = "Enviar para Firebase";
    btn.disabled = false;
  }
};
</script>
</body>
</html>
